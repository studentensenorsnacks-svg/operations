<style>
:root{
  --red:#e8001d;--red-dark:#b8001a;
  --bg:#f4f4f5;--surface:#fff;--surface2:#eeeef0;--surface3:#e4e4e7;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a1a;--text2:#5f5f66;--text3:#9a9aa2;
  --green:#15803d;--green-bg:#eaf6ec;
  --blue:#1f76e8;--blue-bg:#e8f0fd;
  --font:'Barlow',sans-serif;--font-cond:'Barlow Condensed',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{height:58px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;}
.logo-img{height:30px;width:auto;display:block;}
.topbar-divider{width:1px;height:22px;background:var(--border2);}
.topbar-section{font-size:0.92rem;font-weight:700;color:var(--text2);font-family:var(--font-cond);letter-spacing:.02em;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.back-link{padding:6px 14px;border-radius:6px;border:1px solid var(--border2);color:var(--text2);font-size:0.78rem;font-weight:600;text-decoration:none;}
.back-link:hover{border-color:var(--red);color:var(--text);background:rgba(232,0,29,0.06);}

.main{max-width:920px;margin:0 auto;padding:18px 18px 60px;}
.page-hdr{margin-bottom:16px;}
.page-title{font-family:var(--font-cond);font-size:28px;font-weight:800;line-height:1;}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px;}
.save-state{font-size:12px;color:var(--text3);font-family:var(--mono);margin-left:8px;}
.save-state.saved{color:var(--green);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-h{font-family:var(--font-cond);font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:12px;}

.addrow{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select{padding:9px 11px;border:1px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:14px;background:#fff;color:var(--text);}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,118,232,.12);}

.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface2);padding:5px;border-radius:11px;width:fit-content;}
.tab{padding:9px 22px;border-radius:8px;border:none;background:transparent;font-family:var(--font-cond);font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--surface);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tab .cnt{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text3);}
.tab.active .cnt{color:var(--blue);}

.cat-h{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-cond);font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);padding:16px 4px 8px;border-bottom:2px solid var(--blue-bg);margin-bottom:6px;}
.cat-h .cnt{font-size:12px;color:var(--text3);font-family:var(--mono);font-weight:500;}
.crow{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.crow .name{flex:2;min-width:160px;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:14px;}
.crow .art{width:120px;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-family:var(--mono);font-size:13px;}
.crow .art:disabled{background:var(--surface2);color:var(--text3);}
.pd-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);white-space:nowrap;font-weight:600;}
.crow .perdoos{width:62px;padding:8px 8px;border:1px solid var(--border2);border-radius:8px;font-family:var(--mono);font-size:13px;text-align:center;}
.crow .cat{width:170px;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;font-family:var(--font);font-size:13px;background:#fff;}
.crow input:focus,.crow select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,118,232,.12);}
.nvz-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);white-space:nowrap;font-weight:600;}
.also-wrap{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text2);white-space:nowrap;font-weight:600;padding:5px 9px;border:1px solid var(--border2);border-radius:8px;cursor:pointer;}
.also-wrap:hover{background:var(--surface2);}
.also-wrap.on{color:var(--blue);border-color:var(--blue);background:var(--blue-bg);}
.del{width:34px;height:36px;border:1px solid var(--border2);background:#fff;border-radius:8px;color:var(--red);font-size:17px;font-weight:700;cursor:pointer;flex-shrink:0;}
.del:hover{background:rgba(232,0,29,.08);}

.btn{padding:10px 16px;border-radius:9px;border:1px solid var(--border2);background:var(--surface);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:7px;}
.btn:hover{background:var(--surface2);}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-blue:hover{background:#1660c4;}
.hide{display:none!important;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}

@media (max-width:680px){
  .topbar{height:52px;padding:0 10px;gap:8px;}
  .logo-img{height:26px;}
  .topbar-divider,.topbar-section{display:none;}
  .topbar-right{overflow-x:auto;min-width:0;-webkit-overflow-scrolling:touch;gap:6px;}
  .topbar-right::-webkit-scrollbar{height:0;}
  .back-link{padding:6px 10px;font-size:0.74rem;white-space:nowrap;flex-shrink:0;}
  .save-state{flex-shrink:0;}
  .main{padding:14px 12px 50px;}
  .page-title{font-size:22px;}
  .page-sub{font-size:12px;}
  .card{padding:13px;border-radius:10px;margin-bottom:12px;}
  .card-h{font-size:13.5px;margin-bottom:10px;}
  .tabs{width:100%;}
  .tab{flex:1;padding:9px 12px;font-size:13.5px;justify-content:center;}
  .addrow{flex-direction:column;align-items:stretch;gap:9px;}
  .addrow .field,.addrow input,.addrow select,.addrow .btn{width:100%!important;min-width:0!important;flex:0 0 auto;}
  .addrow .btn{justify-content:center;}
  .crow{padding:10px 0;gap:6px;border-bottom:1px solid var(--border2);position:relative;padding-right:44px;}
  .crow .name{flex:1 1 100%;min-width:0;font-size:13.5px;padding:9px 10px;}
  .crow .del{position:absolute;top:10px;right:0;width:36px;height:36px;flex-shrink:0;}
  .crow .art{flex:1 1 calc(60% - 4px);width:auto;min-width:0;}
  .crow .pd-wrap{flex:1 1 calc(40% - 4px);}
  .crow .perdoos{flex:1;min-width:0;width:100%;}
  .crow .cat{flex:1 1 100%;width:100%;}
  .crow .nvz-wrap,.crow .also-wrap{flex:1 1 calc(50% - 3px);justify-content:center;padding:8px 9px;border:1px solid var(--border2);border-radius:8px;}
  .crow .nvz-wrap{border-style:dashed;}
  .cat-h{font-size:13px;padding:14px 2px 6px;}
}
</style>
</head>

  <div class="tabs">

  </div>

  <!-- TOEVOEGEN -->
  <div class="card">
    <div class="card-h">Product toevoegen aan <span id="add-scope-lbl" style="color:var(--blue)">Postel</span></div>
    <div class="addrow">
      <div class="field" style="flex:2;min-width:160px;"><label for="a-name">Naam</label><input type="text" id="a-name" placeholder="bv. Loempia"></div>
      <div class="field" style="width:130px;"><label for="a-art">Artikelnr</label><input type="text" id="a-art" inputmode="numeric" placeholder="optioneel"></div>
      <div class="field" style="width:90px;"><label for="a-perdoos">Per doos</label><input type="text" id="a-perdoos" inputmode="numeric" placeholder="bv. 24"></div>
      <div class="field" style="width:180px;"><label for="a-cat">Categorie</label>
        <select id="a-cat" onchange="onAddCatChange()"></select>
      </div>
      <input type="text" id="a-cat-new" class="field hide" style="width:160px;padding:9px 11px;border:1px solid var(--border2);border-radius:8px;align-self:flex-end;" placeholder="Nieuwe categorie">
      <button class="btn btn-blue" type="button" onclick="addProduct()">+ Toevoegen</button>
    </div>
  </div>

  <!-- LIJST -->
  <div class="card">
    <div class="card-h">Producten</div>
    <div id="catalog-list"><div class="empty">Laden…</div></div>
  </div>
</div>

function standaardSeedMap(){
  const map={}; let idx=0;
  STANDAARD_SEED.forEach(c=>c.items.forEach(it=>{ map['s'+idx]={ name:it[0], art:null, cat:c.cat, perDoos:(it[1]==null?null:it[1]), order:idx, ts:0, inPostel:false, inStandaard:true }; idx++; }));
  return map;
}

// Een product zonder vlaggen is "legacy" (uit de oude, gedeelde catalogus) → hoort bij Postel.
function prodInPostel(p){ return p.inPostel===true || (p.inPostel==null && p.inStandaard==null); }
function prodInStandaard(p){ return p.inStandaard===true; }

let PRODS = [];          // {key,name,art,cat,order,inPostel,inStandaard}
let SCOPE = 'postel';    // actieve tab
let renderedSig = '';

(async function init(){
  if(window.fbAuthReady) await window.fbAuthReady;
  const ref = fbdb.ref(CAT_PATH);
  try{
    const snap = await ref.once('value');
    const v = snap.val() || {};
    if(!Object.keys(v).some(k=>k.charAt(0)==='b')){
      await ref.update(seedMap());
    }else{
      // Migratie: bestaande producten zonder scope-vlaggen → Postel
      const mig = {};
      Object.entries(v).forEach(([key,p])=>{ if(p && p.inPostel==null && p.inStandaard==null) mig[key+'/inPostel']=true; });
      if(Object.keys(mig).length) await ref.update(mig);
    }
    // Standaard-catalogus eenmalig vullen met de CSV-producten als die nog leeg is
    if(!Object.keys(v).some(k=>k.charAt(0)==='s')){
      await ref.update(standaardSeedMap());
    }
  }catch(e){ console.error('seed/migratie mislukt', e); }
  ref.on('value', snap=>{
    const v = snap.val() || {};
    PRODS = Object.entries(v).map(([key,p])=>({
      key, name:p.name||'', art:(p.art==null?null:p.art), cat:p.cat||'Eigen producten', order:(p.order!=null?p.order:(p.ts||0)),
      perDoos:(p.perDoos==null?null:p.perDoos),
      inPostel:prodInPostel(p), inStandaard:prodInStandaard(p)
    }));
    fillAddCats();
    // Alleen volledig hertekenen als de set/scope/categorie wijzigt, zodat je niet de focus verliest tijdens het typen.
    const sig = PRODS.map(p=>p.key+':'+p.cat+':'+(p.inPostel?1:0)+(p.inStandaard?1:0)).sort().join('|');
    if(sig !== renderedSig){ renderedSig = sig; render(); }
    updateTabCounts();
  }, err=>{
    document.getElementById('catalog-list').innerHTML = '<div class="empty">⚠️ Kon catalogus niet laden ('+(err.code||err.message)+').</div>';
  });
})();

function setScope(s){
  if(SCOPE===s) return;
  SCOPE = s;
  document.getElementById('tab-postel').classList.toggle('active', s==='postel');
  document.getElementById('tab-standaard').classList.toggle('active', s==='standaard');
  document.getElementById('add-scope-lbl').textContent = s==='postel' ? 'Postel' : 'Standaard';
  renderedSig = ''; render();
}
function scopedProds(){ return PRODS.filter(p=> SCOPE==='postel' ? p.inPostel : p.inStandaard); }
function updateTabCounts(){
  document.getElementById('cnt-postel').textContent = PRODS.filter(p=>p.inPostel).length;
  document.getElementById('cnt-standaard').textContent = PRODS.filter(p=>p.inStandaard).length;
}

function allCats(){
  const set = new Set(CATEGORY_ORDER);
  PRODS.forEach(p=>set.add(p.cat));
  return Array.from(set).sort((a,b)=>{ const c=catOrderIndex(a)-catOrderIndex(b); return c || (a<b?-1:1); });
}
function fillAddCats(){
  const sel = document.getElementById('a-cat');
  const cur = sel.value;
  const cats = allCats();
  sel.innerHTML = cats.map(c=>'<option>'+esc(c)+'</option>').join('') + '<option value="__new">+ Nieuwe categorie…</option>';
  if(cur && (cats.includes(cur) || cur==='__new')) sel.value = cur;
}
function onAddCatChange(){
  const sel = document.getElementById('a-cat');
  document.getElementById('a-cat-new').classList.toggle('hide', sel.value!=='__new');
}

function render(){
  const wrap = document.getElementById('catalog-list');
  const list = scopedProds();
  if(!list.length){
    wrap.innerHTML = SCOPE==='postel'
      ? '<div class="empty">Nog geen producten in de Postel-catalogus.</div>'
      : '<div class="empty">Nog geen producten in de Standaard-catalogus.<br>Voeg er toe, of vink bij een Postel-product <b>"ook in Standaard"</b> aan.</div>';
    return;
  }
  const sorted = list.slice().sort((a,b)=>{
    const ci = catOrderIndex(a.cat)-catOrderIndex(b.cat); if(ci) return ci;
    if(a.cat!==b.cat) return a.cat<b.cat?-1:1;
    return (a.order||0)-(b.order||0);
  });
  const cats = allCats();
  const otherField = SCOPE==='postel' ? 'inStandaard' : 'inPostel';
  const otherLabel = SCOPE==='postel' ? 'ook in Standaard' : 'ook in Postel';
  let html='', lastCat=null;
  sorted.forEach(p=>{
    if(p.cat!==lastCat){
      const n = sorted.filter(x=>x.cat===p.cat).length;
      html += '<div class="cat-h"><span>'+esc(p.cat)+'</span><span class="cnt">'+n+'</span></div>';
      lastCat = p.cat;
    }
    const nvz = (p.art==null);
    const alsoOn = p[otherField]===true;
    const catOpts = cats.map(c=>'<option'+(c===p.cat?' selected':'')+'>'+esc(c)+'</option>').join('');
    html += '<div class="crow" data-key="'+p.key+'">'
      + '<input class="name" type="text" value="'+esc(p.name)+'" onchange="saveField(\''+p.key+'\',\'name\',this.value)">'
      + '<input class="art" type="text" inputmode="numeric" value="'+esc(p.art==null?'':p.art)+'"'+(nvz?' disabled placeholder="—"':'')+' onchange="saveField(\''+p.key+'\',\'art\',this.value)">'
      + '<label class="nvz-wrap"><input type="checkbox"'+(nvz?' checked':'')+' onchange="toggleNvz(\''+p.key+'\',this.checked)"> n.v. Zon</label>'
      + '<label class="pd-wrap"><input class="perdoos" type="text" inputmode="numeric" value="'+esc(p.perDoos==null?'':p.perDoos)+'" placeholder="—" title="Aantal per doos" onchange="saveField(\''+p.key+'\',\'perDoos\',this.value)"> /doos</label>'
      + '<select class="cat" onchange="saveField(\''+p.key+'\',\'cat\',this.value)">'+catOpts+'</select>'
      + '<label class="also-wrap'+(alsoOn?' on':'')+'"><input type="checkbox"'+(alsoOn?' checked':'')+' onchange="toggleAlso(\''+p.key+'\',\''+otherField+'\',this.checked)"> '+otherLabel+'</label>'
      + '<button class="del" type="button" title="Verwijderen" onclick="delProduct(\''+p.key+'\')">×</button>'
      + '</div>';
  });
  wrap.innerHTML = html;
}
function toggleAlso(key, field, checked){
  fbdb.ref(CAT_PATH+'/'+key+'/'+field).set(!!checked).then(flashSaved).catch(e=>{ console.error(e); alert('Opslaan mislukt.'); });
}

function flashSaved(){
  const el = document.getElementById('save-state');
  el.textContent = '✓ bewaard'; el.classList.add('saved');
  clearTimeout(el._t); el._t = setTimeout(()=>{ el.textContent=''; el.classList.remove('saved'); }, 1500);
}
function saveField(key, field, value){
  let val = value;
  if(field==='art'){ val = (value||'').trim() || null; }
  if(field==='perDoos'){ const n = parseInt((value||'').trim(),10); val = (isNaN(n)||n<=0) ? null : n; }
  if(field==='name'){ val = (value||'').trim(); if(!val){ alert('Naam mag niet leeg zijn.'); render(); return; } }
  fbdb.ref(CAT_PATH+'/'+key+'/'+field).set(val).then(flashSaved).catch(e=>{ console.error(e); alert('Opslaan mislukt.'); });
}
function toggleNvz(key, checked){
  // aangevinkt = geen artikelnr (NIET VAN ZON) → art = null
  const v = checked ? null : '';
  fbdb.ref(CAT_PATH+'/'+key+'/art').set(v).then(()=>{ renderedSig=''; flashSaved();
    // forceer hertekenen zodat het art-veld in/uitschakelt
    const ev = PRODS.find(p=>p.key===key); if(ev){ ev.art=v; } render();
  }).catch(e=>{ console.error(e); alert('Opslaan mislukt.'); });
}
function addProduct(){
  const name = (document.getElementById('a-name').value||'').trim();
  const art = (document.getElementById('a-art').value||'').trim() || null;
  const pdN = parseInt((document.getElementById('a-perdoos').value||'').trim(),10);
  const perDoos = (isNaN(pdN)||pdN<=0) ? null : pdN;
  let cat = document.getElementById('a-cat').value;
  if(cat==='__new') cat = (document.getElementById('a-cat-new').value||'').trim();
  if(!name){ alert('Vul een naam in.'); return; }
  if(!cat){ alert('Kies of vul een categorie in.'); return; }
  const flags = { inPostel: SCOPE==='postel', inStandaard: SCOPE==='standaard' };
  fbdb.ref(CAT_PATH).push().set({ name, art, perDoos, cat, order: Date.now(), ts: Date.now(), ...flags }).then(()=>{
    document.getElementById('a-name').value=''; document.getElementById('a-art').value='';
    document.getElementById('a-perdoos').value='';
    document.getElementById('a-cat-new').value=''; document.getElementById('a-cat-new').classList.add('hide');
    document.getElementById('a-cat').value = cat;
    flashSaved();
  }).catch(e=>{ console.error(e); alert('Toevoegen mislukt.'); });
}
function delProduct(key){
  const p = PRODS.find(x=>x.key===key);
  if(!confirm('"'+(p?p.name:'')+'" verwijderen uit de catalogus?')) return;
  if(window.logDeletion)logDeletion('catalogus','Catalogus-item "'+(p?p.name:key)+'" verwijderd',{ref:key,name:p?p.name:''});
  fbdb.ref(CAT_PATH+'/'+key).remove().then(flashSaved).catch(e=>{ console.error(e); alert('Verwijderen mislukt.'); });
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// CSV-export van de actieve catalogus (Postel of Standaard), gesorteerd zoals getoond.
function csvCell(v){
  const s = (v==null ? '' : String(v));
  return /[";\n\r]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function exportCSV(){
  const list = scopedProds().slice().sort((a,b)=>{
    const ci = catOrderIndex(a.cat)-catOrderIndex(b.cat); if(ci) return ci;
    if(a.cat!==b.cat) return a.cat<b.cat?-1:1;
    return (a.order||0)-(b.order||0);
  });
  if(!list.length){ alert('Geen producten om te exporteren in deze catalogus.'); return; }
  const headers = ['Categorie','Naam','Artikelnr','Per doos'];
  const rows = list.map(p=>[
    p.cat,
    p.name,
    p.art==null ? '' : p.art,
    p.perDoos==null ? '' : p.perDoos
  ].map(csvCell).join(';'));
  const csv = '﻿' + [headers.join(';'), ...rows].join('\r\n');
  const d = new Date();
  const stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'productcatalogus-' + SCOPE + '-' + stamp + '.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  flashSaved();
}
