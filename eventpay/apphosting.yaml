# Firebase App Hosting configuratie voor EventPay beheer.
# Zie https://firebase.google.com/docs/app-hosting/configure
#
# Secrets worden NIET in deze file gezet maar in Google Secret Manager,
# en hier alleen gerefereerd via `secret:`. Run éénmalig:
#   firebase apphosting:secrets:set EVENTPAY_API_KEY
#   firebase apphosting:secrets:set AUTH_USERNAME
#   firebase apphosting:secrets:set AUTH_PASSWORD

runConfig:
  # 1 instance, schaalt tot 3. Minimum 0 = serverless, slaapt als niemand
  # de URL bezoekt → kostenefficiënt.
  minInstances: 0
  maxInstances: 3
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # Niet-geheim — kan in code/config.
  - variable: EVENTPAY_BASE_URL
    value: https://senor-snacks.eventpay.be
    availability:
      - BUILD
      - RUNTIME

  # Geheimen — opgehaald uit Secret Manager bij elke runtime-start.
  - variable: EVENTPAY_API_KEY
    secret: EVENTPAY_API_KEY
    availability:
      - RUNTIME

  - variable: AUTH_USERNAME
    secret: AUTH_USERNAME
    availability:
      - RUNTIME

  - variable: AUTH_PASSWORD
    secret: AUTH_PASSWORD
    availability:
      - RUNTIME
