<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Señor Snacks · Prijslijst SJOCK 50</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --red:#E6173B;
  --black:#030304;
  --white:#FFFFFF;
  --green:#0a7d3f;
  --display:'Anton',Impact,sans-serif;
  --label:'Bebas Neue',sans-serif;
  --body:'Montserrat',system-ui,sans-serif;
  --brush:'Caveat','Permanent Marker',cursive;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--body);background:#e8e8e8;display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 16px 80px;}

/* ---------- global toolbar ---------- */
.topbar{width:210mm;max-width:100%;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;background:var(--black);color:#fff;border-radius:14px;padding:16px 22px;position:sticky;top:12px;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.35);}
.topbar .title{font-family:var(--label);letter-spacing:.14em;font-size:20px;display:flex;align-items:center;gap:12px;}
.topbar .title img{height:24px;}
.topbar .hint{font-size:12px;color:rgba(255,255,255,.6);font-weight:600;}
.btn{font-family:var(--label);letter-spacing:.08em;font-size:15px;border:none;border-radius:9px;padding:10px 16px;cursor:pointer;transition:transform .08s ease,filter .12s ease;}
.btn:active{transform:translatey(1px);}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{filter:brightness(1.08);}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;}
.btn-ghost:hover{background:rgba(255,255,255,.22);}
.btn-dark{background:var(--black);color:#fff;}
.btn-mini{font-family:var(--label);letter-spacing:.06em;font-size:13px;border:1px solid rgba(0,0,0,.15);background:rgba(0,0,0,.03);color:rgba(0,0,0,.6);border-radius:7px;padding:5px 12px;cursor:pointer;}
.btn-mini:hover{background:rgba(230,23,59,.08);border-color:rgba(230,23,59,.35);color:var(--red);}

/* ---------- per-page control bar ---------- */
.page-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.page-toolbar{width:210mm;max-width:100%;display:flex;gap:8px;align-items:center;justify-content:flex-end;}
.page-toolbar .cat-label{margin-right:auto;font-family:var(--label);letter-spacing:.12em;font-size:14px;color:rgba(0,0,0,.45);}

/* ---------- the A4 page ---------- */
.page{width:210mm;min-height:297mm;background:var(--white);color:var(--black);position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6);}

.header{padding:22px 40px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.08);}
.header-left{display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
.header-event{font-family:var(--label);letter-spacing:.32em;font-size:13px;color:var(--red);}
.brand-chip{background:var(--black);border-radius:12px;padding:12px 20px;display:flex;align-items:center;}
.brand-chip img{height:46px;width:auto;display:block;}
.event-badge{min-width:118px;padding:14px 18px;border:2px solid var(--black);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:#fff;text-align:center;}
.event-badge .ev-k{font-family:var(--label);letter-spacing:.22em;font-size:10px;color:rgba(0,0,0,.4);}
.event-badge .ev-n{font-family:var(--display);font-size:30px;line-height:.9;color:var(--black);}
.event-badge .ev-n .red{color:var(--red);}

.token-banner{margin:22px 40px 0;background:var(--red);border-radius:10px;padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;}
.token-banner .eq{font-family:var(--display);font-size:26px;letter-spacing:.04em;color:#fff;}
.token-banner .sep{width:1px;height:28px;background:rgba(255,255,255,.3);}
.token-banner .t{font-family:var(--brush);font-size:20px;color:rgba(255,255,255,.9);transform:rotate(-1.2deg);}

.body{padding:30px 40px 0;flex:1;}
.section-head{display:flex;align-items:center;gap:16px;margin-bottom:2px;}
.section-head .accent{width:6px;height:52px;background:var(--red);border-radius:3px;flex-shrink:0;}
.section-head h2{font-family:var(--display);text-transform:uppercase;font-size:60px;line-height:.88;color:var(--black);}

.menu{display:flex;flex-direction:column;border-top:1px solid rgba(0,0,0,.1);margin-top:10px;}
.item{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 0;border-bottom:1px solid rgba(0,0,0,.07);position:relative;}
.item.featured{padding:26px 0;}
.item.featured .item-name{font-size:38px;}
.item-left{flex:1;display:flex;flex-direction:column;gap:5px;}
.item-name{font-family:var(--body);font-size:31px;font-weight:900;letter-spacing:.01em;text-transform:uppercase;line-height:1.08;display:flex;align-items:baseline;flex-wrap:wrap;gap:0 10px;}
.item-name .nm{display:inline;}
.item-name .note{font-family:var(--label);letter-spacing:.05em;font-size:14px;color:rgba(0,0,0,.4);text-transform:none;font-weight:400;}
.veg{display:inline-flex;align-items:center;vertical-align:middle;color:var(--green);}
.veg svg{width:22px;height:22px;}
.item-sub{font-size:13px;color:rgba(0,0,0,.6);font-weight:600;letter-spacing:.02em;line-height:1.5;}
.item-price{flex-shrink:0;display:flex;align-items:stretch;gap:10px;}
.token-badge,.euro-badge{border-radius:8px;padding:8px 14px;text-align:center;min-width:82px;display:flex;flex-direction:column;justify-content:center;}
.token-badge{background:rgba(230,23,59,.08);border:1px solid rgba(230,23,59,.3);}
.euro-badge{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);}
.badge-k{font-family:var(--label);letter-spacing:.1em;font-size:15px;color:rgba(0,0,0,.55);line-height:1;}
.token-badge .badge-n{font-family:var(--display);font-size:29px;color:var(--red);line-height:1;margin-top:3px;}
.euro-badge .badge-n{font-family:var(--display);font-size:29px;color:var(--black);line-height:1;margin-top:3px;}
.euro-only .euro-badge{min-width:120px;}

/* waarborg / footnote row */
.deposit{margin-top:14px;display:flex;flex-direction:column;gap:4px;}
.deposit .dep{font-family:var(--label);letter-spacing:.06em;font-size:14px;color:rgba(0,0,0,.5);display:flex;justify-content:space-between;border-bottom:1px dashed rgba(0,0,0,.15);padding:6px 0;}

/* add item button inside page */
.additem{margin-top:12px;}

.foot{margin-top:auto;}
.smakelijk{padding:30px 40px 6px;text-align:center;position:relative;}
.smakelijk .word{font-family:var(--display);font-size:104px;letter-spacing:.04em;line-height:.9;color:rgba(0,0,0,.06);}
.smakelijk .sub{font-family:var(--brush);font-size:38px;color:var(--black);margin-top:-6px;display:inline-block;}
.smakelijk .sub .dot{color:var(--red);}
.foot-bar{margin-top:8px;border-top:1px solid rgba(0,0,0,.12);padding:16px 40px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.foot-bar .brand{display:flex;align-items:center;gap:12px;}
.foot-bar .brand .chip{background:var(--black);border-radius:8px;padding:7px 12px;display:flex;}
.foot-bar .brand .chip img{height:20px;}
.foot-bar .brand .tag{font-family:var(--brush);font-size:20px;color:rgba(0,0,0,.55);}
.foot-bar .info{font-family:var(--label);letter-spacing:.1em;font-size:12px;color:rgba(0,0,0,.45);text-align:right;line-height:1.5;}
.foot-bar .info .red{color:var(--red);}

/* ---------- editing affordances ---------- */
[contenteditable]{outline:none;border-radius:4px;transition:box-shadow .1s ease,background .1s ease;}
[contenteditable]:hover{box-shadow:0 0 0 1px rgba(230,23,59,.3);}
[contenteditable]:focus{box-shadow:0 0 0 2px rgba(230,23,59,.55);background:rgba(230,23,59,.04);}
.row-del{position:absolute;left:-30px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,.12);color:#fff;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s ease,background .12s ease;}
.item:hover .row-del{opacity:1;}
.row-del:hover{background:var(--red);}

/* hide all controls + edit hints during capture */
body.capturing .topbar,
body.capturing .page-toolbar,
body.capturing .row-del,
body.capturing .additem,
body.capturing .ctrl{display:none !important;}
body.capturing [contenteditable]:hover,
body.capturing [contenteditable]:focus{box-shadow:none !important;background:none !important;}

@media print{
  body{background:#fff;padding:0;gap:0;}
  .topbar,.page-toolbar,.row-del,.additem,.ctrl{display:none !important;}
  .page{box-shadow:none;}
  @page{size:A4;margin:0;}
}
</style>
</head>

  <div class="hint">Klik op eender welke tekst of prijs om te bewerken · tokenaantal past de euro-prijs automatisch aan</div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-ghost" onclick="addCategory()">+ categorie / pagina</button>
    <button class="btn btn-red" onclick="downloadAll()">⤓ Download alle PNG's</button>
  </div>
</div>

<div id="pages"></div>

<template id="page-tpl"></template>

<script>
/* ====================== DATA ====================== */
const STATE = {
  event: 'SJOCK 50',
  rate: 3.00,               // euro per token
  categories: [
    { title:'Fries', items:[
      { name:'Belgian Fries', note:'(+ sauce)', tokens:2, featured:true,
        sub:'Mayo · Ketchup · Tartare · Andalouse · Joppie · Samurai' },
      { name:'Curryworst / Frikandel', tokens:1 },
      { name:'Boulet / Meatball', tokens:1 },
      { name:'Kipcorn', tokens:1 },
      { name:'Bami : Noodle Snack', note:'(also veggie)', tokens:1, veg:true },
      { name:'Kaaskroket', tokens:1 },
    ]},
    { title:'Burgers', items:[
      { name:'Bicky Burger', tokens:2, featured:true },
      { name:'Bicky Veggie Burger', tokens:2, veg:true },
    ]},
    { title:'Gourmet Burgers', items:[
      { name:'Gourmet Burger Meat', tokens:5, featured:true,
        sub:'Grain bread · beef burger · lettuce · tomato · bacon · cheese · onion' },
      { name:'Gourmet Burger Chicken', tokens:5, veg:false,
        sub:'Grain bread · chicken burger · lettuce · tomato · bacon · cheese · onion' },
    ]},
    { title:'Sandwiches', items:[
      { name:'Sandwich Hamburger', note:'(onion + sauce)', tokens:2 },
      { name:'Sandwich Chickenburger', note:'(onion + sauce)', tokens:2 },
      { name:'Sandwich Bratwurst', note:'(onion + sauce)', tokens:3 },
      { name:'Sandwich Mexicano', note:'(onion + sauce)', tokens:3 },
      { name:'Sandwich Frikandel', note:'(onion + sauce)', tokens:2 },
      { name:'Veggie Burger', note:'(onion + sauce)', tokens:2, veg:true },
    ]},
    { title:'Sandwiches & Wraps', items:[
      { name:'Sandwich Cheese', tokens:2 },
      { name:'Sandwich Ham', tokens:2 },
      { name:'Sandwich Healthy', tokens:3, sub:'lettuce · tomato · egg · coleslaw' },
      { name:'Sandwich filled Cheese', tokens:3, sub:'lettuce · tomato · egg · cheese' },
      { name:'Sandwich filled Ham', tokens:3, sub:'lettuce · tomato · egg · ham' },
      { name:'Wrap Vegan', tokens:3, veg:true, sub:'hummus · lettuce · tomato · coleslaw' },
      { name:'Wrap Chicken', tokens:3, sub:'+ herb cheese · lettuce · tomato' },
      { name:'Wrap Smoked Salmon', tokens:3, sub:'+ herb cheese · lettuce · tomato' },
    ]},
    { title:'Pizza', items:[
      { name:'Pizza Slice Margherita', tokens:2, featured:true },
      { name:'Pizza Slice Verdura', tokens:2 },
      { name:'Pizza Slice Salami', tokens:2 },
      { name:'Pizza Slice Spinach', note:'(vegan)', tokens:2, veg:true },
    ]},
    { title:'Pasta / Noodles', items:[
      { name:'Penne', tokens:4, featured:true,
        sub:'+ Bolognaise sauce &amp; shredded cheese\n+ Veggie sauce &amp; shredded cheese\n+ Carbonara sauce &amp; shredded cheese' },
    ]},
    { title:'Kebab', items:[
      { name:'Kebab', note:'(+ sauce)', tokens:4, featured:true },
    ]},
    { title:'Loempia', items:[
      { name:'Spring Roll Chicken', note:'(80g / 2 pcs)', tokens:2 },
      { name:'Spring Roll Veggie', note:'(80g / 2 pcs)', tokens:2, veg:true },
      { name:'Samosa', note:'(5 pcs)', tokens:2 },
      { name:'Rice + Spring Roll', note:'(+ fried vegetables)', tokens:4 },
    ]},
  ]
};

/* ====================== HELPERS ====================== */
const VEG_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-label="veggie"><path d="M17 8C8 10 5.9 16.2 3.8 21.5c-.4 1-.8 2-1.2 3l-1.6-.4c.4-1 .8-2 1.2-3C3.3 17 5.5 12 12 10c-3 .5-6 2-8 4 0-4 3-9 9-10 3-.5 6-.3 8 .5.2 1.5.4 3-1 4z"/></svg>';

function parseNum(str){
  if(str==null) return 0;
  const m = String(str).replace(',', '.').match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : 0;
}
function fmtEuro(n){
  if(Number.isInteger(n)) return '€ '+n;
  return '€ '+n.toFixed(2).replace('.', ',');
}
function esc(s){ return String(s).replace(/&(?!amp;)/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function slug(s){ return String(s).trim().replace(/[^\w\-]+/g,'_').replace(/^_+|_+$/g,''); }

/* ====================== RENDER ====================== */
const LOGO = document.getElementById('topLogo').src;

function itemHTML(it){
  const veg = it.veg ? '<span class="veg">'+VEG_SVG+'</span>' : '';
  const note = it.note ? ' <span class="note" contenteditable="true">'+esc(it.note)+'</span>' : '';
  const sub = it.sub!=null ? '<div class="item-sub" contenteditable="true">'+String(it.sub).replace(/\n/g,'<br>')+'</div>' : '';
  const tk = it.tokens;
  const euro = fmtEuro(tk*STATE.rate);
  return `
  <div class="item${it.featured?' featured':''}">
    <button class="row-del" title="verwijder" onclick="this.closest('.item').remove()">×</button>
    <div class="item-left">
      <div class="item-name"><span class="nm" contenteditable="true">${esc(it.name)}</span>${note} ${veg}</div>
      ${sub}
    </div>
    <div class="item-price">
      <div class="token-badge">
        <div class="badge-k">TOKENS</div>
        <div class="badge-n"><span class="tok" contenteditable="true" oninput="recalc(this)">${tk}</span> T</div>
      </div>
      <div class="euro-badge">
        <div class="badge-k">PRIJS</div>
        <div class="badge-n eur">${euro}</div>
      </div>
    </div>
  </div>`;
}

function pageHTML(cat, idx){
  const items = cat.items.map(itemHTML).join('');
  return `
  <div class="page-wrap">
    <div class="page-toolbar">
      <span class="cat-label">Pagina ${idx+1} · ${esc(cat.title)}</span>
      <button class="btn-mini" onclick="addItem(this)">+ item</button>
      <button class="btn-mini" onclick="removePage(this)">× pagina</button>
      <button class="btn btn-dark" onclick="downloadPage(this)">⤓ Download PNG</button>
    </div>
    <div class="page">
      <div class="header">
        <div class="header-left">
          <div class="header-event" contenteditable="true">OFFICIEEL EVENTMENU</div>
          <div class="brand-chip"><img src="${LOGO}" alt="Señor Snacks"></div>
        </div>
        <div class="event-badge">
          <div class="ev-k">EVENT</div>
          <div class="ev-n" contenteditable="true" oninput="syncEvent(this)">${esc(STATE.event)}</div>
        </div>
      </div>

      <div class="token-banner">
        <div class="eq">1 TOKEN = <span class="rate" contenteditable="true" oninput="rateChanged(this)">${fmtEuro(STATE.rate)}</span></div>
        <div class="sep"></div>
        <div class="t">Enjoy the good stuff!</div>
      </div>

      <div class="body">
        <div class="section-head">
          <div class="accent"></div>
          <h2 contenteditable="true">${esc(cat.title)}</h2>
        </div>
        <div class="menu">${items}</div>
        <div class="additem"><button class="btn-mini ctrl" onclick="addItemToMenu(this)">+ item toevoegen</button></div>
      </div>

      <div class="foot">
        <div class="smakelijk">
          <div class="word">SMAKELIJK</div>
          <div class="sub">Taste<span class="dot">.</span> Enjoy<span class="dot">.</span> Smile<span class="dot">.</span></div>
        </div>
        <div class="foot-bar">
          <div class="brand">
            <div class="chip"><img src="${LOGO}" alt="Señor Snacks"></div>
            <div class="tag">Señor Snacks</div>
          </div>
          <div class="info">
            WINKELOM 87C · 2440 GEEL<br>
            <span class="red">WWW.SENORSNACKS.BE</span> · BE 0465570997
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function render(){
  const root = document.getElementById('pages');
  root.innerHTML = STATE.categories.map((c,i)=>pageHTML(c,i)).join('');
  relabel();
}

/* ====================== INTERACTIVITY ====================== */
function recalc(tokEl){
  const item = tokEl.closest('.item');
  const eur = item.querySelector('.eur');
  eur.textContent = fmtEuro(parseNum(tokEl.textContent)*STATE.rate);
}
function rateChanged(rateEl){
  STATE.rate = parseNum(rateEl.textContent);
  // recompute every euro badge everywhere
  document.querySelectorAll('.page').forEach(pg=>{
    // keep each page's own rate field in sync
    pg.querySelectorAll('.item').forEach(item=>{
      const tk = item.querySelector('.tok');
      const eur = item.querySelector('.eur');
      if(tk&&eur) eur.textContent = fmtEuro(parseNum(tk.textContent)*STATE.rate);
    });
  });
  document.querySelectorAll('.rate').forEach(r=>{ if(r!==rateEl) r.textContent = fmtEuro(STATE.rate); });
}
function syncEvent(el){
  STATE.event = el.textContent.trim();
  document.querySelectorAll('.event-badge .ev-n').forEach(n=>{ if(n!==el) n.textContent = STATE.event; });
}
function blankItemHTML(){
  return itemHTML({ name:'Nieuw item', tokens:2 });
}
function addItem(btn){ addItemToMenu(btn.closest('.page-wrap').querySelector('.additem .ctrl')); }
function addItemToMenu(btn){
  const menu = btn.closest('.body').querySelector('.menu');
  menu.insertAdjacentHTML('beforeend', blankItemHTML());
}
function addCategory(){
  STATE.categories.push({ title:'Nieuwe categorie', items:[{name:'Nieuw item', tokens:2}] });
  const root = document.getElementById('pages');
  root.insertAdjacentHTML('beforeend', pageHTML(STATE.categories[STATE.categories.length-1], STATE.categories.length-1));
  relabel();
  window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'});
}
function removePage(btn){
  if(!confirm('Deze pagina verwijderen?')) return;
  btn.closest('.page-wrap').remove();
  relabel();
}
function relabel(){
  document.querySelectorAll('.page-wrap').forEach((w,i)=>{
    const cat = w.querySelector('.section-head h2')?.textContent.trim() || '';
    const lbl = w.querySelector('.cat-label');
    if(lbl) lbl.textContent = `Pagina ${i+1} · ${cat}`;
  });
}

/* ====================== PNG EXPORT ====================== */
async function capture(pageEl, filename){
  await document.fonts.ready;
  document.body.classList.add('capturing');
  await new Promise(r=>setTimeout(r,60));
  try{
    const canvas = await html2canvas(pageEl, {
      scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false,
      windowWidth: pageEl.scrollWidth, windowHeight: pageEl.scrollHeight
    });
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } finally {
    document.body.classList.remove('capturing');
  }
}
function pageFilename(wrap){
  const ev = slug(STATE.event || 'Event');
  const cat = slug(wrap.querySelector('.section-head h2')?.textContent || 'Categorie');
  return `Prijslijst_${ev}_${cat}.png`;
}
async function downloadPage(btn){
  const wrap = btn.closest('.page-wrap');
  await capture(wrap.querySelector('.page'), pageFilename(wrap));
}
async function downloadAll(){
  const wraps = [...document.querySelectorAll('.page-wrap')];
  for(const w of wraps){
    await capture(w.querySelector('.page'), pageFilename(w));
    await new Promise(r=>setTimeout(r,350));
  }
}

/* ====================== INIT ====================== */
render();
</script>
</body>
</html>
