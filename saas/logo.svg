<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" rx="80" fill="#0a0e27"/>

  <!-- Calendar icon -->
  <g transform="translate(108, 92)">
    <rect x="6" y="-6" width="8" height="22" rx="4" fill="#dde6f4"/>
    <rect x="54" y="-6" width="8" height="22" rx="4" fill="#dde6f4"/>
    <rect x="0" y="6" width="68" height="22" rx="6" fill="#2563eb"/>
    <rect x="0" y="24" width="68" height="62" rx="6" fill="#2563eb"/>
    <g fill="#dde6f4">
      <circle cx="14" cy="44" r="3"/>
      <circle cx="24" cy="44" r="3"/>
      <circle cx="34" cy="44" r="3"/>
      <circle cx="44" cy="44" r="3"/>
      <circle cx="14" cy="58" r="3"/>
      <circle cx="24" cy="58" r="3"/>
      <circle cx="34" cy="58" r="3"/>
      <circle cx="44" cy="58" r="3"/>
      <circle cx="14" cy="72" r="3"/>
      <circle cx="24" cy="72" r="3"/>
      <circle cx="34" cy="72" r="3"/>
    </g>
  </g>

  <!-- Grid -->
  <g transform="translate(95, 220)">
    <!-- Header dark band -->
    <rect x="0" y="0" width="610" height="44" fill="#172048" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Outer + inner grid lines -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <rect x="0" y="44" width="610" height="332"/>
      <line x1="87" y1="44" x2="87" y2="376"/>
      <line x1="174" y1="44" x2="174" y2="376"/>
      <line x1="261" y1="44" x2="261" y2="376"/>
      <line x1="348" y1="44" x2="348" y2="376"/>
      <line x1="435" y1="44" x2="435" y2="376"/>
      <line x1="522" y1="44" x2="522" y2="376"/>
      <line x1="0" y1="100" x2="610" y2="100"/>
      <line x1="0" y1="156" x2="610" y2="156"/>
      <line x1="0" y1="212" x2="610" y2="212"/>
      <line x1="0" y1="268" x2="610" y2="268"/>
      <line x1="0" y1="324" x2="610" y2="324"/>
    </g>

    <!-- Colored pills scattered through cells -->
    <g>
      <!-- Row 1 (y center 72) -->
      <rect x="200" y="63" width="54" height="18" rx="9" fill="#60a5fa"/>
      <rect x="374" y="63" width="54" height="18" rx="9" fill="#4ade80"/>
      <rect x="461" y="63" width="54" height="18" rx="9" fill="#c084fc"/>
      <!-- Row 2 (y center 128) -->
      <rect x="113" y="119" width="54" height="18" rx="9" fill="#4ade80"/>
      <rect x="200" y="119" width="54" height="18" rx="9" fill="#60a5fa"/>
      <rect x="461" y="119" width="54" height="18" rx="9" fill="#c084fc"/>
      <!-- Row 3 (y center 184) -->
      <rect x="113" y="175" width="54" height="18" rx="9" fill="#c084fc"/>
      <rect x="287" y="175" width="54" height="18" rx="9" fill="#60a5fa"/>
      <rect x="461" y="175" width="54" height="18" rx="9" fill="#4ade80"/>
      <!-- Row 4 (y center 240) -->
      <rect x="113" y="231" width="54" height="18" rx="9" fill="#60a5fa"/>
      <rect x="374" y="231" width="54" height="18" rx="9" fill="#c084fc"/>
      <rect x="548" y="231" width="54" height="18" rx="9" fill="#4ade80"/>
      <!-- Row 5 (y center 296) -->
      <rect x="200" y="287" width="54" height="18" rx="9" fill="#4ade80"/>
      <rect x="287" y="287" width="54" height="18" rx="9" fill="#60a5fa"/>
      <rect x="461" y="287" width="54" height="18" rx="9" fill="#60a5fa"/>
      <!-- Row 6 (y center 352) -->
      <rect x="113" y="343" width="54" height="18" rx="9" fill="#4ade80"/>
      <rect x="287" y="343" width="54" height="18" rx="9" fill="#c084fc"/>
      <rect x="461" y="343" width="54" height="18" rx="9" fill="#4ade80"/>
    </g>
  </g>

  <!-- Separator -->
  <line x1="120" y1="625" x2="680" y2="625" stroke="#dde6f4" stroke-width="2"/>

  <!-- EventSheet text -->
  <text x="400" y="708" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="78" font-weight="900" letter-spacing="-2">
    <tspan fill="#ffffff">Event</tspan><tspan fill="#3ECF8E">Sheet</tspan>
  </text>

  <!-- Tagline -->
  <text x="400" y="750" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="500" fill="#5DD39E" letter-spacing="4">plan · organize · execute</text>
</svg>
