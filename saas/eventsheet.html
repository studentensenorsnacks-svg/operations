<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EventSheet</title>
<link rel="icon" type="image/svg+xml" href="eventsheet-logo.svg"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f0;--bg2:#f7ecd8;--bg3:#f0ddbe;
  --text:#3a2415;--text2:#7a5a40;--text3:#b89878;
  --border:rgba(120,60,20,.12);--border2:rgba(120,60,20,.22);
  --accent:#e8662b;--accent2:#d05420;--accent-bg:#fef0e2;--accent-border:#f4a560;
  --info-bg:#fef0e2;--info-text:#a04510;--info-border:#f4a560;
  --warn-bg:#fdf0d4;--warn-text:#7a4d12;--warn-border:#e9b870;
  --ok-bg:#eaf2dc;--ok-text:#3f5a18;--ok-border:#bcd28e;
  --err-bg:#fde2dd;--err-text:#7a2818;--err-border:#f0a896;
  --r:10px;--rl:14px;--rxl:18px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  --shadow:0 1px 2px rgba(120,60,20,.05),0 2px 6px rgba(120,60,20,.04);
  --shadow-lg:0 4px 14px rgba(120,60,20,.08),0 14px 36px rgba(120,60,20,.06);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#1c130b;--bg2:#28190e;--bg3:#382412;
    --text:#fdf0e0;--text2:#c5a079;--text3:#856042;
    --border:rgba(255,210,170,.1);--border2:rgba(255,210,170,.2);
    --accent:#ff8048;--accent2:#ff9560;--accent-bg:#3a2418;--accent-border:#a85020;
    --info-bg:#3a2418;--info-text:#ffa67a;--info-border:#a85020;
    --warn-bg:#3a2a14;--warn-text:#e9b870;--warn-border:#7a4d12;
    --ok-bg:#1f3014;--ok-text:#bcd28e;--ok-border:#3f5a18;
    --err-bg:#3a1e18;--err-text:#f0a896;--err-border:#7a2818;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
    --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.3);
  }
}
:root[data-theme="dark"]{
  --bg:#1c130b;--bg2:#28190e;--bg3:#382412;
  --text:#fdf0e0;--text2:#c5a079;--text3:#856042;
  --border:rgba(255,210,170,.1);--border2:rgba(255,210,170,.2);
  --accent:#ff8048;--accent2:#ff9560;--accent-bg:#3a2418;--accent-border:#a85020;
  --info-bg:#3a2418;--info-text:#ffa67a;--info-border:#a85020;
  --warn-bg:#3a2a14;--warn-text:#e9b870;--warn-border:#7a4d12;
  --ok-bg:#1f3014;--ok-text:#bcd28e;--ok-border:#3f5a18;
  --err-bg:#3a1e18;--err-text:#f0a896;--err-border:#7a2818;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
  --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.3);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,textarea{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
textarea{resize:vertical;line-height:1.5}
button{padding:8px 14px;font-size:13px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s,transform .05s,box-shadow .12s;font-weight:500}
button:hover{background:var(--bg2);border-color:var(--accent-border)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;box-shadow:0 1px 3px rgba(232,102,43,.3)}
button.primary:hover{background:var(--accent2);border-color:var(--accent2);box-shadow:0 2px 8px rgba(232,102,43,.35)}
button.ghost{background:transparent;border-color:transparent}
button.ghost:hover{background:var(--bg2)}
button.danger{color:var(--err-text);border-color:var(--err-border)}
button.danger:hover{background:var(--err-bg)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;font-size:11px;font-weight:600;border-radius:100px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.chip.accent{background:var(--accent-bg);color:var(--accent2);border-color:var(--accent-border)}
.chip.ok{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-border)}
.chip.warn{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:var(--shadow-lg);border-color:var(--border2)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
.setup-screen{max-width:560px;margin:4rem auto;padding:2rem;border:1px solid var(--border);border-radius:var(--rl);background:var(--bg2)}
.setup-screen h1{font-size:22px;margin-bottom:8px}
.setup-screen p{color:var(--text2);margin-bottom:1rem;line-height:1.6}
.setup-screen pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:1rem;font-size:12px;overflow-x:auto;margin:1rem 0;line-height:1.6;font-family:monospace}
.setup-screen code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:monospace}
.fade-in{animation:fadeIn .25s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  .responsive-grid-2{grid-template-columns:1fr !important}
  .hide-sm{display:none !important}
}
</style>

(function(){

  } catch(e){}
})();

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, useRef, useMemo } = React;
const h = React.createElement;

// ============ helpers ============
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const fmt = d => d ? new Date(d).toLocaleDateString('nl-BE',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtT = d => d ? new Date(d).toLocaleString('nl-BE',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
const fmtDur = m => !m ? '' : (m >= 60 ? Math.floor(m/60)+'u'+(m%60?(' '+(m%60)+'m'):'') : m+'m');
const ini = n => n?.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) || '?';

const CATS = ['F&B','Personeel','Veiligheidsdiensten','Logistiek','Support on site','Productie','Structuren','Sound & Light'];
const CAT_ICON = {
  'F&B':'ti-tools-kitchen-2',
  'Personeel':'ti-users-group',
  'Veiligheidsdiensten':'ti-shield-check',
  'Logistiek':'ti-truck-delivery',
  'Support on site':'ti-headset',
  'Productie':'ti-bulb',
  'Structuren':'ti-building-bridge-2',
  'Sound & Light':'ti-volume'
};
const CAT_MAP = {
  'Catering':'F&B','Audio/Visual':'Sound & Light','Decoratie':'Productie',
  'Transport':'Logistiek','Beveiliging':'Veiligheidsdiensten','Fotografie':'Productie',
  'Bloemen':'Productie','Anders':'Productie'
};
const normCat = c => CAT_MAP[c] || c || '';

const code = () => { const a = new Uint8Array(16); crypto.getRandomValues(a); return Array.from(a, b => b.toString(16).padStart(2,'0')).join(''); };
const normCode = c => (c||'').trim().toLowerCase();
const shortCode = c => c && c.length > 12 ? c.slice(0,4)+'…'+c.slice(-4) : c;

const ST = {
  open: {l:'Open', bg:'var(--warn-bg)', c:'var(--warn-text)', b:'var(--warn-border)'},
  beantwoord: {l:'Beantwoord', bg:'var(--info-bg)', c:'var(--info-text)', b:'var(--info-border)'},
  gesloten: {l:'Gesloten', bg:'var(--bg2)', c:'var(--text2)', b:'var(--border2)'}
};
const TST = {
  open: {l:'Open', bg:'var(--bg2)', c:'var(--text2)', b:'var(--border)'},
  done: {l:'Klaar', bg:'var(--ok-bg)', c:'var(--ok-text)', b:'var(--ok-border)'}
};

// Visibility: { mode: 'all' | 'cats' | 'sups', cats?: [...], sups?: [...] }
const VIS_ALL = { mode: 'all' };
const visMatches = (vis, sup) => {
  if (!vis || vis.mode === 'all') return true;
  if (vis.mode === 'cats') return vis.cats?.includes(normCat(sup.category));
  if (vis.mode === 'sups') return vis.sups?.includes(sup.id);
  return true;
};
const visLabel = vis => {
  if (!vis || vis.mode === 'all') return 'Alle leveranciers';
  if (vis.mode === 'cats') return `${vis.cats?.length || 0} categorie${vis.cats?.length === 1 ? '' : 'ën'}`;
  if (vis.mode === 'sups') return `${vis.sups?.length || 0} leverancier${vis.sups?.length === 1 ? '' : 's'}`;
  return '';
};
// Old document compat
const docVis = d => d.visibility || (d.linkedSuppliers?.length ? { mode:'sups', sups:d.linkedSuppliers } : VIS_ALL);

// Vaste velden definities
const FIXED = [
  { key:'location', label:'Locatie + adres', icon:'ti-map-pin', placeholder:'Bv. Sportpark De Bres, Hoofdweg 12, 9000 Gent' },
  { key:'parking', label:'Parking-info', icon:'ti-parking', placeholder:'Bv. Crew parking aan gate B, gratis met deze badge' },
  { key:'crew', label:'Crew bonnen', icon:'ti-receipt', placeholder:'Bv. 4 maaltijdbonnen per crewlid, af te halen bij infodesk' },
  { key:'contact', label:'Verantwoordelijke + telefoon', icon:'ti-user-circle', placeholder:'Bv. Jelle Verboven · 0470 12 34 56' }
];

// ============ Firestore ============
const FB = {
  watch(col, cb) {
    const { db, collection, onSnapshot } = window.__firebase;
    return onSnapshot(collection(db, col), snap => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      items.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      cb(items);
    });
  },
  watchWs(col, wsId, cb) {
    const { db, collection, query, where, onSnapshot } = window.__firebase;
    return onSnapshot(query(collection(db, col), where('wsId', '==', wsId)), snap => {
      const items = [];
      snap.forEach(d => items.push({ id: d.id, ...d.data() }));
      items.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      cb(items);
    });
  },
  watchDoc(col, id, cb) {
    const { db, doc, onSnapshot } = window.__firebase;
    return onSnapshot(doc(db, col, id), snap => cb(snap.exists() ? { id: snap.id, ...snap.data() } : null));
  },
  async getDoc(col, id) {
    const { db, doc, getDoc } = window.__firebase;
    const s = await getDoc(doc(db, col, id));
    return s.exists() ? { id: s.id, ...s.data() } : null;
  },
  async queryFirst(col, field, value) {
    const { db, collection, query, where, getDocs } = window.__firebase;
    const snap = await getDocs(query(collection(db, col), where(field, '==', value)));
    let result = null;
    snap.forEach(d => { if (!result) result = { id: d.id, ...d.data() }; });
    return result;
  },
  async save(col, id, data) {
    const { db, doc, setDoc } = window.__firebase;
    await setDoc(doc(db, col, id), data, { merge: true });
  },
  async del(col, id) {
    const { db, doc, deleteDoc } = window.__firebase;
    await deleteDoc(doc(db, col, id));
  },
  async upload(path, file, opts = {}) {
    const { storage, portalStorage, sRef, uploadBytes, getDownloadURL } = window.__firebase;
    const st = opts.portal ? portalStorage : storage;
    const safe = file.name.replace(/[^\w.\-]+/g, '_');
    const full = `${path}/${Date.now()}-${safe}`;
    const r = sRef(st, full);
    await uploadBytes(r, file);
    const url = await getDownloadURL(r);
    return { name: file.name, url, size: file.size, type: file.type, path: full };
  },
  async delFile(path) {
    const { storage, sRef, deleteObject } = window.__firebase;
    try { await deleteObject(sRef(storage, path)); } catch {}
  }
};

// ============ Portal API (Cloud Function) ============
const PORTAL_API = 'https://europe-west1-senorkeuringqr.cloudfunctions.net/portalAction';
async function portalAPI(action, data) {
  const res = await fetch(PORTAL_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...data })
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(j.error || `HTTP ${res.status}`);
  return j;
}

// Authenticated SaaS-side endpoints (GDPR rights, workspace mgmt).
const ACCOUNT_API = 'https://europe-west1-senorkeuringqr.cloudfunctions.net/accountAction';
async function accountAPI(action, data) {
  const auth = window.__firebase?.auth;
  const user = auth?.currentUser;
  if (!user) throw new Error('Niet ingelogd');
  const idToken = await user.getIdToken();
  const res = await fetch(ACCOUNT_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
    body: JSON.stringify({ action, ...data })
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(j.error || `HTTP ${res.status}`);
  return j;
}

// ============ Export helpers (PDF + Word) ============
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('nl-BE', { day: '2-digit', month: 'long', year: 'numeric' }) : ''; }
function safeFilename(s) { return String(s||'event').replace(/[^\w\-]+/g, '_').slice(0,60); }

function newPdf() {
  const { jsPDF } = window.jspdf || {};
  if (!jsPDF) throw new Error('PDF library niet geladen');
  return new jsPDF({ unit: 'mm', format: 'a4' });
}

function pdfHeader(doc, title, subtitle) {
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text(title || '', 14, 18);
  if (subtitle) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(120);
    doc.text(subtitle, 14, 25);
    doc.setTextColor(0);
  }
  doc.setDrawColor(232, 102, 43);
  doc.setLineWidth(0.6);
  doc.line(14, 29, 196, 29);
}

function pdfFooter(doc) {
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text(`EventSheet · ${new Date().toLocaleDateString('nl-BE')} · pagina ${i}/${pages}`, 14, 290);
    doc.setTextColor(0);
  }
}

function exportEventPDF(event, suppliers) {
  const doc = newPdf();
  const evSups = (suppliers||[]).filter(s => event.suppliers?.includes(s.id));
  pdfHeader(doc, event.name || 'Event', [event.date && fmtDate(event.date), event.location].filter(Boolean).join(' · '));
  let y = 36;

  if (event.description) {
    doc.setFontSize(10); doc.setTextColor(80);
    const lines = doc.splitTextToSize(event.description, 182);
    doc.text(lines, 14, y); y += lines.length * 5 + 4;
    doc.setTextColor(0);
  }

  // Vaste velden / praktische info
  const fixedLabels = { location: 'Locatie + adres', parking: 'Parking-info', crew: 'Crew bonnen', contact: 'Verantwoordelijke + telefoon' };
  const fixedRows = Object.entries(fixedLabels).map(([k,l]) => {
    const v = event.fixed?.[k];
    const text = v?.text || (v?.variants?.length ? v.variants.map(x => `[${x.cat}] ${x.text}`).join(' / ') : '');
    return text ? [l, text] : null;
  }).filter(Boolean);
  if (fixedRows.length) {
    doc.autoTable({ startY: y, head: [['Praktische info', '']], body: fixedRows, theme: 'grid', headStyles: { fillColor: [232,102,43], textColor: 255 }, columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 132 } } });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Run sheet
  const tl = (event.timeline||[]).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
  if (tl.length) {
    doc.autoTable({ startY: y, head: [['Tijd', 'Wat', 'Duur', 'Zone', 'Verantw.']], body: tl.map(t => [t.time||'', t.text||'', fmtDur(t.duration), t.zone||'', t.responsible||'']), theme: 'striped', headStyles: { fillColor: [232,102,43], textColor: 255 }, styles: { fontSize: 9 } });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Tasks
  const tasks = event.tasks || [];
  if (tasks.length) {
    doc.autoTable({ startY: y, head: [['Taak', 'Deadline', 'Status', 'Voor']], body: tasks.map(t => [t.title||'', t.deadline ? fmtDate(t.deadline) : '', t.status==='done'?'Klaar':'Open', t.visibility?.mode==='internal'?'Intern':(t.visibility?.mode==='all'?'Iedereen':(t.visibility?.mode==='cats'?'Cat: '+(t.visibility.cats||[]).join(', '):'Specifiek'))]), theme: 'striped', headStyles: { fillColor: [232,102,43], textColor: 255 }, styles: { fontSize: 9 } });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Suppliers
  if (evSups.length) {
    doc.autoTable({ startY: y, head: [['Leverancier', 'Bedrijf', 'E-mail', 'Telefoon', 'Categorie']], body: evSups.map(s => [s.name||'', s.company||'', s.email||'', s.phone||'', s.category||'']), theme: 'striped', headStyles: { fillColor: [232,102,43], textColor: 255 }, styles: { fontSize: 9 } });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Documents
  const docs = event.documents || [];
  if (docs.length) {
    doc.autoTable({ startY: y, head: [['Document', 'Notitie']], body: docs.map(d => [d.name||'', d.notes||'']), theme: 'striped', headStyles: { fillColor: [232,102,43], textColor: 255 }, styles: { fontSize: 9 } });
  }

  pdfFooter(doc);
  doc.save(`eventsheet-${safeFilename(event.name)}.pdf`);
}

function exportRunSheetPDF(event) {
  const doc = newPdf();
  pdfHeader(doc, 'Draaiboek — ' + (event.name||''), [event.date && fmtDate(event.date), event.location].filter(Boolean).join(' · '));
  const tl = (event.timeline||[]).slice().sort((a,b) => (a.time||'').localeCompare(b.time||''));
  if (!tl.length) {
    doc.setFontSize(11); doc.text('Geen tijdslijn-items.', 14, 40);
  } else {
    doc.autoTable({ startY: 36, head: [['Tijd', 'Wat gebeurt er', 'Duur', 'Zone', 'Verantwoordelijke']], body: tl.map(t => [t.time||'', t.text||'', fmtDur(t.duration), t.zone||'', t.responsible||'']), theme: 'striped', headStyles: { fillColor: [232,102,43], textColor: 255, fontSize: 10 }, styles: { fontSize: 10, cellPadding: 3 }, columnStyles: { 0: { cellWidth: 18, fontStyle: 'bold' }, 2: { cellWidth: 18 }, 3: { cellWidth: 28 }, 4: { cellWidth: 35 } } });
  }
  pdfFooter(doc);
  doc.save(`draaiboek-${safeFilename(event.name)}.pdf`);
}

        h('input', { type: 'email', value: email, onChange: e => setEmail(e.target.value), placeholder: 'jij@bedrijf.be', autoFocus: mode==='login' })

function InviteRedeem({ token, user }) {
  const [invite, setInvite] = useState(undefined);
  const [busy, setBusy] = useState(false), [msg, setMsg] = useState('');
  useEffect(() => { (async () => {
    const i = await FB.getDoc('invites', token);
    setInvite(i);
  })(); }, [token]);
  const accept = async () => {
    if (!user || !invite || busy) return;
    setBusy(true); setMsg('');
    try {
      const fb = window.__firebase;
      const ws = await FB.getDoc('workspaces', invite.wsId);
      if (!ws) throw new Error('Werkruimte bestaat niet meer');
      const now = new Date().toISOString();
      const members = { ...(ws.members||{}), [user.uid]: { role: invite.role || 'member', email: user.email, displayName: user.displayName || user.email, joinedAt: now } };
      await fb.setDoc(fb.doc(fb.db, 'workspaces', invite.wsId), { members }, { merge: true });
      const userDoc = await FB.getDoc('users', user.uid);
      const wsIds = Array.from(new Set([...((userDoc?.workspaceIds)||[]), invite.wsId]));
      await fb.setDoc(fb.doc(fb.db, 'users', user.uid), { workspaceIds: wsIds, defaultWorkspaceId: invite.wsId }, { merge: true });
      await fb.deleteDoc(fb.doc(fb.db, 'invites', token));
      window.location.hash = '';
    } catch (e) { setMsg(e?.message || 'Mislukt'); }
    finally { setBusy(false); }
  };
  if (invite === undefined) return h(CenterCard, { title: 'Uitnodiging laden...' });
  if (!invite) return h(CenterCard, { title: 'Uitnodiging ongeldig', subtitle: 'Deze link bestaat niet meer of is al gebruikt.' },
    h('button', { className: 'primary', onClick: () => { window.location.hash = ''; }, style: { width: '100%', justifyContent: 'center' } }, 'Naar inlog')
  );
  if (!user) return h(AuthScreen, { inviteCtx: invite });
  return h(CenterCard, { title: `Word lid van ${invite.wsName||'werkruimte'}`, subtitle: invite.email ? `Uitgenodigd als ${invite.email} (${invite.role||'member'}).` : `Rol: ${invite.role||'member'}.` },
    h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
      msg && h('div', { style: { fontSize: 12, padding: '8px 11px', background: 'var(--err-bg)', color: 'var(--err-text)', borderRadius: 'var(--r)' } }, msg),
      h('button', { className: 'primary', onClick: accept, disabled: busy, style: { width: '100%', justifyContent: 'center', padding: '10px 14px' } }, busy ? 'Bezig...' : 'Uitnodiging accepteren'),
      h('button', { className: 'ghost', onClick: () => window.__firebase.signOut(window.__firebase.auth), style: { width: '100%', justifyContent: 'center', fontSize: 12 } }, 'Uitloggen als andere gebruiker')
    )
  );
}

function Root() {
  const fb = window.__firebase;
  if (!fb || !fb.configValid) return h(SetupScreen);

  const [user, setUser] = useState(undefined);
  const [userDoc, setUserDoc] = useState(undefined);
  const [currentWs, setCurrentWs] = useState(() => { try { return localStorage.getItem('ef_ws') || null; } catch { return null; } });
  const [wsDoc, setWsDoc] = useState(undefined);
  const [hash, setHash] = useState(() => window.location.hash || '');

  useEffect(() => {
    const onHash = () => setHash(window.location.hash || '');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => fb.onAuthStateChanged(fb.auth, u => setUser(u || null)), []);

  useEffect(() => {
    if (user === null) { setUserDoc(null); return; }
    if (!user) return;
    return FB.watchDoc('users', user.uid, d => setUserDoc(d));
  }, [user?.uid]);

  useEffect(() => {
    if (!userDoc) return;
    if (currentWs && userDoc.workspaceIds?.includes(currentWs)) return;
    const next = userDoc.defaultWorkspaceId || userDoc.workspaceIds?.[0] || null;
    setCurrentWs(next);
    try { if (next) localStorage.setItem('ef_ws', next); else localStorage.removeItem('ef_ws'); } catch {}
  }, [userDoc]);

  useEffect(() => {
    if (!currentWs) { setWsDoc(null); return; }
    return FB.watchDoc('workspaces', currentWs, d => setWsDoc(d));
  }, [currentWs]);

  const switchWs = wsId => {
    setCurrentWs(wsId);
    try { localStorage.setItem('ef_ws', wsId); } catch {}
    if (user) fb.setDoc(fb.doc(fb.db, 'users', user.uid), { defaultWorkspaceId: wsId }, { merge: true });
  };
  const signOutUser = async () => {
    try { localStorage.removeItem('ef_ws'); } catch {}
    setCurrentWs(null);
    await fb.signOut(fb.auth);
  };

  let content;
  if (hash.startsWith('#portal')) {
    content = h(App, { portalMode: true, user: null, userDoc: null, wsId: null, wsDoc: null, switchWs, signOutUser });
  } else if (hash.startsWith('#invite/')) {
    content = h(InviteRedeem, { token: hash.replace('#invite/', ''), user });
  } else if (user === undefined || (user && userDoc === undefined)) {
    content = h(CenterCard, { title: 'EventSheet', subtitle: 'Laden...' });
  } else if (!user) {
    content = h(AuthScreen);
  } else if (!userDoc?.workspaceIds?.length) {
    content = h(WorkspaceSetup, { user, userDoc });
  } else if (currentWs && wsDoc === undefined) {
    content = h(CenterCard, { title: 'Werkruimte laden...' });
  } else if (!currentWs) {
    content = h(WorkspaceSetup, { user, userDoc });
  } else {
    const myRole = wsDoc?.members?.[user.uid]?.role || 'editor';
    const canEdit = myRole !== 'viewer';
    content = h(App, { portalMode: false, user, userDoc, wsId: currentWs, wsDoc, switchWs, signOutUser, canEdit, myRole });
  }
  return h(React.Fragment, null, content, h(CookieBanner));
}

// ============ APP ============
function App({ portalMode, user, userDoc, wsId, wsDoc, switchWs, signOutUser, canEdit = true, myRole }) {
  const fb = window.__firebase;
  if (!fb || !fb.configValid) return h(SetupScreen);

  const [ev, sEv] = useState([]);
  const [su, sSu] = useState([]);
  const [rq, sRq] = useState([]);
  const [ld, sLd] = useState(false);
  const [pg, sPg] = useState('dashboard');
  const [eid, sEid] = useState(null);
  const [tb, sTb] = useState('overzicht');
  const [md, sMd] = useState(null);
  const [selR, sSelR] = useState(null);
  const [pCode, sPCode] = useState('');
  const [actP, sActP] = useState(null);
  const [ts, sTs] = useState(null);
  const [pe, sPe] = useState(() => { try { return JSON.parse(localStorage.getItem('ef_pending') || '{}'); } catch { return {}; } });

  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith('#portal')) {
      sPg('portal');
      const c = hash.replace('#portal/','').replace('#portal','');
      if (c) sActP(c);
    }
  }, []);

  const reloadPortal = async (code) => {
    try {
      const res = await portalAPI('load', { portalCode: code });
      if (res.customToken && fb.portalAuth) {
        try { await fb.signInWithCustomToken(fb.portalAuth, res.customToken); }
        catch (e) { console.error('portal signin failed', e); }
      }
      sSu(res.supplier ? [res.supplier] : []);
      sEv(res.events || []);
      sRq(res.requests || []);
    } catch (err) { console.error('portal load', err); sSu([]); sEv([]); sRq([]); }
    finally { sLd(true); }
  };

  useEffect(() => {
    if (portalMode) {
      const hash = window.location.hash;
      const code = hash.replace('#portal/','').replace('#portal','');
      if (!code) { sLd(true); return; }
      reloadPortal(code);
      return;
    }
    if (!wsId) return;
    let loaded = 0;
    const done = () => { if (++loaded >= 3) sLd(true); };
    const u1 = FB.watchWs('events', wsId, d => { sEv(d); done(); });
    const u2 = FB.watchWs('suppliers', wsId, d => { sSu(d); done(); });
    const u3 = FB.watchWs('requests', wsId, d => { sRq(d); done(); });
    return () => { u1(); u2(); u3(); };
  }, [wsId, portalMode]);

  const savePe = v => { sPe(v); localStorage.setItem('ef_pending', JSON.stringify(v)); };
  const toast = (m, t='ok') => { sTs({m,t}); setTimeout(() => sTs(null), 3500); };
  const pCt = Object.values(pe).reduce((a,m) => a + Object.values(m).reduce((b,c) => b+c.length, 0), 0);
  const cE = ev.find(e => e.id === eid);
  const oR = rq.filter(r => r.status === 'beantwoord').length;
  const nav = (p, e=null) => { sPg(p); sEid(e); sTb('overzicht'); sMd(null); sSelR(null); };

  const queueUpdate = (event, itemName, visibility) => {
    if (!visibility) return;
    const targetSups = su.filter(s => event.suppliers?.includes(s.id) && visMatches(visibility, s));
    if (!targetSups.length) return;
    const np = { ...pe };
    targetSups.forEach(s => {
      if (!np[s.id]) np[s.id] = {};
      if (!np[s.id][event.id]) np[s.id][event.id] = [];
      np[s.id][event.id].push({ name: itemName, time: new Date().toISOString() });
    });
    savePe(np);
  };

  // --- Event mutations
  const addEv = async d => {
    if (!wsId) { toast('Geen werkruimte actief', 'err'); return; }
    const id = uid();
    const e = { ...d, wsId, suppliers: [], documents: [], infoBlocks: [], timeline: [], tasks: [], fixed: {}, createdAt: new Date().toISOString(), createdBy: user?.uid || null };
    try { await FB.save('events', id, e); sMd(null); setTimeout(() => nav('event', id), 100); }
    catch (err) { toast('Opslaan mislukt: '+(err?.message||'onbekend'), 'err'); }
  };
  const updE = async patch => {
    if (!cE) return;
    try { await FB.save('events', eid, { ...cE, ...patch }); toast('Opgeslagen'); }
    catch (err) { toast('Mislukt: '+err?.message, 'err'); }
  };
  const delE = async i => { if (!confirm('Verwijderen?')) return; try { await FB.del('events', i); nav('dashboard'); } catch (err) { toast('Mislukt: '+err?.message, 'err'); } };

  // --- Supplier mutations
  const addSu = async d => {
    if (!wsId) { toast('Geen werkruimte actief', 'err'); return; }
    const id = uid();
    try {

function ThemeToggle() {
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem('ef_theme') || 'system'; } catch { return 'system'; } });
  const apply = next => {
    setTheme(next);
    try {
      if (next === 'system') { localStorage.removeItem('ef_theme'); document.documentElement.removeAttribute('data-theme'); }
      else { localStorage.setItem('ef_theme', next); document.documentElement.setAttribute('data-theme', next); }
    } catch {}
  };
  const cycle = () => apply(theme === 'system' ? 'light' : theme === 'light' ? 'dark' : 'system');
  const icon = theme === 'dark' ? 'ti-moon' : theme === 'light' ? 'ti-sun' : 'ti-device-desktop';
  const label = theme === 'dark' ? 'Donker' : theme === 'light' ? 'Licht' : 'Systeem';
  return h('button', { onClick: cycle, className: 'ghost', title: `Thema: ${label} (klik om te wisselen)`, style: { padding: '7px 10px' } }, h('i', { className: `ti ${icon}`, style: { fontSize: 15 } }));
}

function SupplierPicker({ value, onChange, suppliers, scope }) {
  const vis = value || VIS_ALL;
  const [mode, setMode] = useState(vis.mode === 'cats' ? 'cats' : (vis.mode === 'sups' ? 'sups' : 'all'));
  useEffect(() => { setMode(vis.mode === 'cats' ? 'cats' : (vis.mode === 'sups' ? 'sups' : 'all')); }, [value]);

  const sups = (scope || suppliers).slice();
  const presentCats = Array.from(new Set(sups.map(s => normCat(s.category)).filter(Boolean)));

  const setM = m => {
    setMode(m);
    if (m === 'all') onChange(VIS_ALL);
    else if (m === 'cats') onChange({ mode: 'cats', cats: vis.cats || [] });
    else onChange({ mode: 'sups', sups: vis.sups || [] });
  };
  const toggleCat = c => {
    const arr = vis.cats || [];
    const next = arr.includes(c) ? arr.filter(x => x !== c) : [...arr, c];
    onChange({ mode: 'cats', cats: next });
  };
  const toggleSup = id => {
    const arr = vis.sups || [];
    const next = arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id];
    onChange({ mode: 'sups', sups: next });
  };

  return h('div', { style: { border: '1px solid var(--border2)', borderRadius: 'var(--r)', padding: 4, background: 'var(--bg2)' } },
    h('div', { style: { display: 'flex', gap: 2, marginBottom: 8 } },
      ['all','cats','sups'].map(m => h('button', { key: m, onClick: () => setM(m), style: { flex: 1, justifyContent: 'center', fontSize: 12, padding: '7px 10px', background: mode===m?'var(--bg)':'transparent', borderColor: mode===m?'var(--accent-border)':'transparent', color: mode===m?'var(--accent2)':'var(--text2)', fontWeight: mode===m?600:500, boxShadow: mode===m?'var(--shadow)':'none' } },
        h('i', { className: `ti ${m==='all'?'ti-users-group':m==='cats'?'ti-tags':'ti-user'}`, style: { fontSize: 13 } }),
        m==='all' ? 'Iedereen' : m==='cats' ? 'Per categorie' : 'Per leverancier'
      ))
    ),
    h('div', { style: { padding: '6px 4px' } },
      mode === 'all' && h('div', { style: { fontSize: 12, color: 'var(--text2)', textAlign: 'center', padding: '12px 8px' } },
        h('i', { className: 'ti ti-users-group', style: { fontSize: 18, color: 'var(--accent)', display: 'block', marginBottom: 6 } }),
        `Zichtbaar voor alle ${sups.length} gekoppelde leverancier${sups.length===1?'':'s'}`
      ),
      mode === 'cats' && (presentCats.length === 0 ? h('div', { style: { fontSize: 12, color: 'var(--text3)', textAlign: 'center', padding: 12 } }, 'Geen categorieën beschikbaar') :
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 6 } }, CATS.filter(c => presentCats.includes(c)).map(c => {
          const ch = vis.cats?.includes(c);

          return h('div', { key: c, onClick: () => toggleCat(c), style: { display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', borderRadius: 'var(--r)', cursor: 'pointer', background: ch ? 'var(--accent-bg)' : 'var(--bg)', border: `1px solid ${ch ? 'var(--accent-border)' : 'var(--border)'}` } },
            h('div', { style: { width: 16, height: 16, borderRadius: 4, border: `1.5px solid ${ch ? 'var(--accent)' : 'var(--border2)'}`, background: ch ? 'var(--accent)' : 'transparent', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, ch && h('i', { className: 'ti ti-check', style: { fontSize: 11, color: '#fff' } })),
            h('i', { className: `ti ${CAT_ICON[c]||'ti-tag'}`, style: { fontSize: 14, color: ch ? 'var(--accent2)' : 'var(--text2)' } }),
            h('span', { style: { flex: 1, fontSize: 12, fontWeight: 600, color: ch ? 'var(--accent2)' : 'var(--text)' } }, c),
            h('span', { style: { fontSize: 11, color: 'var(--text3)' } }, cnt)

          h('div', { style: { flex: 1 } }, h('div', { style: { fontWeight: 600, fontSize: 13 } }, x.name), h('div', { style: { fontSize: 11, color: 'var(--text2)' } }, x.company || x.email))
        )
      ))),
      FL('Onderwerp', h('input', { value: f.title, onChange: e => upd('title', e.target.value), placeholder: 'Bv. Keuring attest foodtruck' })),
      FL('Bericht', h('textarea', { value: f.message, onChange: e => upd('message', e.target.value), rows: 4, placeholder: 'Bv. Gelieve uw meest recente keuringscertificaat te bezorgen voor 15 december...' })),
      sel?.portalCode && h('div', { style: { padding: '12px 14px', background: 'var(--bg2)', borderRadius: 'var(--r)', fontSize: 12, color: 'var(--text2)' } },
        h('div', { style: { marginBottom: 8, display: 'flex', alignItems: 'center', gap: 8 } }, h('i', { className: 'ti ti-info-circle', style: { fontSize: 14 } }), h('strong', null, 'Hoe ', sel.name, ' antwoordt:')),
        h('button', { onClick: () => copyPortalLink(sel), style: { width: '100%', justifyContent: 'center', fontSize: 12 } }, h('i', { className: 'ti ti-copy', style: { fontSize: 13 } }), 'Kopieer portaal-link voor ', sel.name)

function MQ({ c, pe, su, ev, done }) {
  const entries = Object.entries(pe).map(([sid, m]) => ({ sid, sup: su.find(x => x.id === sid), m })).filter(x => x.sup);
  const eventItems = {};
  entries.forEach(({ m }) => {
    Object.entries(m).forEach(([eid, items]) => {
      if (!eventItems[eid]) eventItems[eid] = new Set();
      items.forEach(x => eventItems[eid].add(x.name));
    });
  });
  const eventIds = Object.keys(eventItems);
  const eventNames = eventIds.map(eid => ev.find(e => e.id === eid)?.name).filter(Boolean);
  const bccList = [...new Set(entries.map(({ sup }) => sup.email).filter(Boolean))];

  const body = `Beste leveranciers,\n\nEr zijn updates beschikbaar${eventNames.length ? ' voor: '+eventNames.join(', ') : ''}.\n\nGelieve jullie leveranciersportaal te raadplegen voor de details. De link werd eerder bezorgd.\n\nBedankt!`;

  const ml = `mailto:?bcc=${encodeURIComponent(bccList.join(','))}&subject=${encodeURIComponent('Update: '+eventNames.join(', '))}&body=${encodeURIComponent(body)}`;

  return h(MW, { title: 'Updates versturen', c, w: 600, footer: h(React.Fragment, null,
    h('button', { onClick: c }, 'Annuleren'),
    h('button', { className: 'primary', onClick: done }, h('i', { className: 'ti ti-check', style: { fontSize: 14 } }), 'Wachtrij wissen')
  ) },
    entries.length === 0 ? Empty('ti-checks', 'Niets in wachtrij') :
    h('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
      h('div', { className: 'card', style: { padding: '12px 14px' } },
        h('div', { style: { fontSize: 13, fontWeight: 600, marginBottom: 6, display: 'flex', alignItems: 'center', gap: 6 } }, h('i', { className: 'ti ti-users', style: { fontSize: 14 } }), `${bccList.length} ontvanger${bccList.length===1?'':'s'} (BCC)`),
        h('div', { style: { fontSize: 12, color: 'var(--text2)', wordBreak: 'break-all', lineHeight: 1.5 } }, bccList.join(', ') || '—')
      ),
      h('a', { href: ml, target: '_blank', style: { textDecoration: 'none' } },
        h('button', { className: 'primary', style: { width: '100%', justifyContent: 'center' } }, h('i', { className: 'ti ti-mail', style: { fontSize: 13 } }), 'Open mail (1× BCC)')
      )
    )
  );
}

  const evS = su.filter(x => e.suppliers?.includes(x.id));

  const addVariant = () => upd('variants', [...f.variants, { cat: presentCats[0] || CATS[0], text: '' }]);
  const updVariant = (i, k, v) => upd('variants', f.variants.map((x, idx) => idx === i ? { ...x, [k]: v } : x));
  const delVariant = i => upd('variants', f.variants.filter((_, idx) => idx !== i));

  return h(MW, { title: field.label, c, w: 580, footer: h(React.Fragment, null,
    value && h('button', { className: 'danger ghost', onClick: () => save(null), style: { marginRight:'auto' } }, h('i', { className:'ti ti-trash', style:{fontSize:13} }), 'Leegmaken'),

          h('button', { onClick: addVariant, style: { fontSize: 11, padding: '5px 9px' } }, h('i', { className:'ti ti-plus', style:{fontSize:12} }), 'Variant')
        ),

            h('button', { className:'ghost danger', onClick: () => delVariant(i), style: { padding: '6px 8px' } }, h('i', { className: 'ti ti-x', style: { fontSize: 14 } }))
          )
