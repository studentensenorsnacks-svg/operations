body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

.topbar{background:var(--surface);border-bottom:3px solid var(--red);padding:0 24px;height:60px;

.topbar-section{font-size:0.92rem;font-weight:600;color:var(--text2);padding-left:14px;border-left:1px solid var(--border2);}

.container{max-width:1400px;margin:0 auto;padding:32px 24px;}
.page-header{margin-bottom:24px;}
.page-title{font-family:var(--font-cond);font-size:2.2rem;font-weight:900;letter-spacing:-0.01em;margin-bottom:6px;}
.page-subtitle{color:var(--text2);font-size:0.92rem;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  border-top:3px solid var(--border2);}
.stat-num{font-family:var(--font-cond);font-size:1.7rem;font-weight:900;line-height:1;}
.stat-lbl{color:var(--text2);font-size:0.66rem;text-transform:uppercase;letter-spacing:0.05em;font-weight:700;margin-top:4px;}
.stat-pill.done{border-top-color:var(--green);}.stat-pill.done .stat-num{color:#4ade80;}
.stat-pill.partial{border-top-color:var(--yellow);}.stat-pill.partial .stat-num{color:#facc15;}
.stat-pill.open{border-top-color:var(--orange);}.stat-pill.open .stat-num{color:#fb923c;}
.stat-pill.none{border-top-color:#6b7280;}.stat-pill.none .stat-num{color:#9ca3af;}

.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);

.filter-btn:hover{color:var(--text);border-color:#444;}
.filter-btn.active{background:var(--red);border-color:var(--red);color:#fff;}

.search-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);

.search-icon{color:var(--text2);font-size:1rem;}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:0.95rem;}
.search-bar input::placeholder{color:var(--text2);}

.search-clear:hover{background:var(--border2);color:var(--text);}

// ── State ───────────────────────────────────────────────────────────
// keuringen wordt centraal bewaard in Firebase Realtime Database onder
// /ocb_keuringen — niet lokaal. Elke registratie is meteen zichtbaar op
// elk toestel.
let keuringen = {};
let filter = 'all';
let dirty = false;   // Firebase-update gemist tijdens openstaande kaart

const FB_REF = fbdb.ref('ocb_keuringen');

// ── Helpers ─────────────────────────────────────────────────────────
function truckById(id){ return TRUCKS.find(t => t.id === id); }
function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function today(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// open / partial / done / none
function getStatus(tid){
  const t = truckById(tid);
  if (!t) return 'open';
  if (!t.elek && !t.gas) return 'none';
  const r = keuringen[tid] || {};
  const elekDone = !t.elek || !!r.elek_done;
  const gasDone  = !t.gas  || !!r.gas_done;
  if (elekDone && gasDone) return 'done';
  if (r.elek_done || r.gas_done) return 'partial';
  return 'open';
}

// Sorteer op het cijfer in de naam, containers (C…) en stockage (S…) achteraan.
function sortByNum(list){
  const grp = n => /\bC\d+/.test(n) ? 2 : /\bS\d+/.test(n) ? 3 : 1;
  const num = n => { const m = n.match(/\d+/g); return m ? parseInt(m[m.length-1]) : 0; };
  return list.sort((a,b) => {
    const ga = grp(a.name), gb = grp(b.name);
    if (ga !== gb) return ga - gb;
    const na = num(a.name), nb = num(b.name);
    if (na !== nb) return na - nb;
    return a.name.localeCompare(b.name, 'nl');
  });
}

const STATUS_LABEL = { done:'Volledig gekeurd', partial:'Deels gekeurd', open:'Nog te keuren', none:'Geen keuring nodig' };

// ── Statistieken + subtitel ─────────────────────────────────────────
function updateStats(){
  const c = { done:0, partial:0, open:0, none:0 };
  TRUCKS.forEach(t => { c[getStatus(t.id)]++; });
  document.getElementById('st-done').textContent = c.done;
  document.getElementById('st-partial').textContent = c.partial;
  document.getElementById('st-open').textContent = c.open;
  document.getElementById('st-none').textContent = c.none;
  document.getElementById('page-subtitle').textContent =
    `${c.open} nog te keuren · ${c.partial} deels · ${c.done} volledig gekeurd`
    + ` · bijgewerkt ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
}

// Werk enkel de status-badges bij (zonder de kaarten te hertekenen).
function refreshPills(){
  TRUCKS.forEach(t => {
    const pill = document.getElementById('pill_' + t.id);
    if (pill){
      const s = getStatus(t.id);
      pill.className = 'badge ' + s;
      pill.textContent = STATUS_LABEL[s];
    }
  });
}

// ── Rendering ───────────────────────────────────────────────────────
function renderOcb(){
  const q = (document.getElementById('search-input').value || '').trim().toLowerCase();
  document.getElementById('search-clear').style.display = q ? 'inline-block' : 'none';

  let list = TRUCKS.filter(t => {
    if (q && !t.name.toLowerCase().includes(q) && !(t.plate||'').toLowerCase().includes(q)) return false;
    if (filter === 'all') return true;
    return getStatus(t.id) === filter;
  });
  sortByNum(list);

  const grid = document.getElementById('ocb-grid');
  if (!list.length){
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>Geen voertuigen gevonden.</div></div>';
    return;
  }

  grid.innerHTML = list.map(t => {
    const r = keuringen[t.id] || {};
    const s = getStatus(t.id);

    let body = '';
    if (t.elek){
      body += checkBlock('elek', t.id, 'Elektriciteitskeuring uitgevoerd', r.elek_done,
        r.keurder_elek, r.datum_elek);
    }
    if (t.gas){
      if (t.elek) body += '<hr class="divider">';
      body += checkBlock('gas', t.id, 'Gaskeuring uitgevoerd', r.gas_done,
        r.keurder_gas, r.datum_gas);
    }
    if (!t.elek && !t.gas){
      body += '<div class="no-keuring">Geen elektriciteits- of gaskeuring vereist voor dit voertuig.</div>';
    } else {
      body += `<div class="fg" style="margin-bottom:4px">
        <label class="field-label">Opmerkingen</label>
        <textarea class="field-textarea" id="opm_${t.id}" rows="2" placeholder="Eventuele opmerkingen…">${esc(r.opmerking)}</textarea>
      </div>
      <button class="save-btn" data-act="save">Opslaan</button>
      <div class="saved-msg" id="saved_${t.id}">✓ Opgeslagen — centraal bewaard</div>`;
    }

    const sub = (t.plate ? t.plate + ' · ' : '') + t.type;
    return `<div class="tc" data-id="${t.id}">
      <div class="tc-head" data-act="toggle">
        <div class="tc-info">
          <div class="tc-name">${esc(t.name)}</div>
          <div class="tc-sub">${esc(sub)}</div>
        </div>
        <div class="tc-right">
          <span class="badge ${s}" id="pill_${t.id}">${STATUS_LABEL[s]}</span>
          <span class="chev" id="chev_${t.id}">▾</span>
        </div>
      </div>
      <div class="tc-body" id="body_${t.id}">${body}</div>
    </div>`;
  }).join('');
}

function checkBlock(kind, tid, label, done, keurder, datum){
  const k = kind + '_' + tid;
  return `<div class="check-row${done ? ' checked' : ''}" data-act="check" data-kind="${kind}">
      <div class="cb">✓</div>
      <span class="check-lbl">${label}</span>
      <input type="hidden" id="${k}" value="${done ? '1' : ''}">
    </div>
    <div class="field-row">
      <div class="fg">
        <label class="field-label">Naam keurder</label>
        <input class="field-input" id="k${kind[0]}_${tid}" value="${esc(keurder)}" placeholder="bv. Bram">
      </div>
      <div class="fg">
        <label class="field-label">Datum keuring</label>
        <input type="date" class="field-input" id="d${kind[0]}_${tid}" value="${esc(datum)}">
      </div>
    </div>`;
}

// ── Interactie (event-delegatie op de grid) ─────────────────────────
function toggleCard(tid){
  const body = document.getElementById('body_' + tid);
  const chev = document.getElementById('chev_' + tid);
  if (!body) return;
  const opening = !body.classList.contains('open');
  body.classList.toggle('open', opening);
  if (chev) chev.classList.toggle('open', opening);
  // Alle kaarten dicht én er kwam intussen verse data binnen → hertekenen.
  if (!opening && dirty && !document.querySelector('.tc-body.open')){
    dirty = false;
    renderOcb();
  }
}

function toggleCheck(tid, row){
  const checked = !row.classList.contains('checked');
  row.classList.toggle('checked', checked);
  const kind = row.dataset.kind;
  const hidden = document.getElementById(kind + '_' + tid);
  if (hidden) hidden.value = checked ? '1' : '';
  // Datum automatisch op vandaag zetten zodra een keuring aangevinkt wordt.
  if (checked){
    const dEl = document.getElementById('d' + kind[0] + '_' + tid);
    if (dEl && !dEl.value) dEl.value = today();
  }
}

function saveRec(tid){
  const t = truckById(tid);
  if (!t) return;
  const val = id => { const e = document.getElementById(id); return e ? e.value.trim() : ''; };
  const rec = { tid: tid, updatedAt: new Date().toISOString() };

  if (t.elek){
    rec.elek_done    = val('elek_' + tid) === '1';
    rec.keurder_elek = val('ke_' + tid);
    rec.datum_elek   = val('de_' + tid);
  }
  if (t.gas){
    rec.gas_done    = val('gas_' + tid) === '1';
    rec.keurder_gas = val('kg_' + tid);
    rec.datum_gas   = val('dg_' + tid);
  }
  rec.opmerking = val('opm_' + tid);

  FB_REF.child(tid).set(rec).then(() => {
    const msg = document.getElementById('saved_' + tid);
    if (msg){ msg.style.display = 'flex'; setTimeout(() => { msg.style.display = 'none'; }, 2500); }
  }).catch(err => {
    alert('Opslaan mislukt: ' + err.message);
  });
}

document.getElementById('ocb-grid').addEventListener('click', e => {
  const card = e.target.closest('.tc');
  if (!card) return;
  const tid = card.dataset.id;
  if (e.target.closest('[data-act="save"]')){ saveRec(tid); return; }
  const checkRow = e.target.closest('[data-act="check"]');
  if (checkRow){ toggleCheck(tid, checkRow); return; }
  if (e.target.closest('[data-act="toggle"]')){ toggleCard(tid); }
});

document.getElementById('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderOcb();
});

function clearSearch(){
  document.getElementById('search-input').value = '';
  renderOcb();
}

// ── Live synchronisatie met Firebase ────────────────────────────────
FB_REF.on('value', snap => {
  keuringen = snap.val() || {};
  updateStats();
  // Hertekenen zou tekst die iemand net intypt wissen → enkel doen als
  // er geen kaart openstaat. Anders wachten tot alle kaarten dicht zijn.
  if (document.querySelector('.tc-body.open')){
    dirty = true;
    refreshPills();
  } else {
    renderOcb();
  }
}, err => {
  document.getElementById('page-subtitle').textContent = 'Kan niet verbinden met de centrale database: ' + err.message;
});

// ── Klok ────────────────────────────────────────────────────────────
function updateClock(){
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleDateString('nl-NL') + '  '
    + new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 30000);

// Eerste render (vóór de eerste Firebase-respons).
renderOcb();
updateStats();
</script>
</body>
</html>
