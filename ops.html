<script>
// ── Agenda gedeeld met de Planning ─────────────────────────────
// De Personeelsfiche heeft GEEN eigen agenda meer. De events komen
// live uit dezelfde Firebase-database als planning.html (pad
// 'ft_planning_v1'). Voeg je hier een event toe of bewerk je datum/
// naam/adres, dan verandert dat ook in de Planning.
//
// De operationele laag (ploeg & uren, wagen, betaling, opmerkingen)
// hoort bij de Personeelsfiche en wordt apart bewaard onder
// 'ops_details', gekoppeld aan het event via zijn id.
const PLAN_PATH = 'ft_planning_v1';
const OPS_PATH  = 'ops_details';

let planningEvents = [];   // ruwe agenda uit de Planning
let opsDetails     = {};   // operationele laag, per event-id
let allEvents      = [];   // samengevoegd — alle views werken hierop
let laadlijsten    = {};   // ft_laadlijsten_v1 — laadlijst-PDF's per event+wagen
let curPage = 'dashboard';
let editing = null;
let activeFilter = 'alle';

const DAYS = ['zo','ma','di','wo','do','vr','za'];
const MONTHS = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmt(d){ const dt=new Date(d); return `${DAYS[dt.getDay()]} ${dt.getDate()} ${MONTHS[dt.getMonth()]}`; }
function fmtDay(d){ return new Date(d).getDate(); }
function fmtMY(d){ const dt=new Date(d); return `${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`; }

function badge(s){
  const m={komend:['badge-blue','Komend'],vandaag:['badge-orange','Vandaag'],afgerond:['badge-gray','Afgerond'],geannuleerd:['badge-red','Geannuleerd']};
  const [c,l]=m[s]||m.komend; return `<span class="badge ${c}">${l}</span>`;
}

function toast(msg, ok=true){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';
  t.style.background=ok?'#eaf3de':'#fcebeb';
  t.style.color=ok?'#3b6d11':'#a32d2d';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function emptyMw(){return{naam:'',vertrekSenor:'',aankomstEvent:'',vertrekEvent:'',aankomstSenor:''};}

// ── HERKENNING ─────────────────────────────────────────────────
// Twee niveaus:
//  1. STRUCTUUR — staat er "Label: waarde" (bv. "Tel: 0489..."), dan
//     nemen we dat exact over. Zet je events zo in Outlook = 100% juist.
//  2. LOSSE HERKENNING — anders classificeren we de vrije tekst op wát
//     het is: plaats, telefoon, naam, aantal, uren, betaling. We raden
//     liever (eventueel fout) dan een veld leeg te laten.
function recognize(name, location, notes){
  const loc=(location||'').trim();
  const raw=[name||'',loc,notes||''].join('\n');
  const all=' '+raw.replace(/\s+/g,' ')+' ';
  const rec={personen:'',uren:'',telefoon:'',betaling:'',naam:'',plaats:'',info:''};
  let m;

  // ── 1. Structuur: "Label: waarde" per regel ──
  const LBL=[
    ['naam',     /\b(?:contactpersoon|contact|klant|naam)\b/i],
    ['telefoon', /\b(?:telefoon|tel|gsm|nummer|nr)\b/i],
    ['plaats',   /\b(?:adres|locatie|plaats)\b/i],
    ['personen', /\b(?:personen|aantal|pers|volk)\b/i],
    ['uren',     /\b(?:uren|uur|tijd|tijdstip)\b/i],
    ['betaling', /\b(?:betaling|betaald|betalen)\b/i]
  ];
  for(const line of raw.split('\n')){
    const mm=line.match(/^\s*([A-Za-zÀ-ÿ ]{3,22}?)\s*[:=]\s*(.+)$/);
    if(!mm) continue;
    const lab=mm[1], val=mm[2].trim().replace(/[;,.]+$/,'');
    if(!val) continue;
    for(const [key,re] of LBL){ if(!rec[key] && re.test(lab)) rec[key]=val; }
  }

  // ── 2. Losse herkenning voor wat nog leeg is ──
  // Aantal personen — "80 pers", "50 man", "85 à 90 man", "200 stuks"
  if(!rec.personen){
    m=all.match(/(\d+(?:\s*(?:à|tot|-|–)\s*\d+)?)\s*(personen|pers|man|mensen|pax|gasten|stuks)\b/i);
    if(m) rec.personen=m[1].replace(/\s+/g,' ').trim()+' '+(m[2].toLowerCase()==='pers'?'personen':m[2].toLowerCase());
  }
  // Openingsuren — "17u45-19u45", "17u-19u", "11u00 tot 14u00", "14u30 à 15u00"
  if(!rec.uren){
    m=all.match(/(\d{1,2}\s*[u:h]\s*\d{0,2})\s*(?:-|–|tot|t\/m|à)\s*(\d{1,2}\s*[u:h]\s*\d{0,2})/i);
    if(m){const nrm=s=>s.replace(/\s+/g,'').replace(/[:h]/i,'u');rec.uren=nrm(m[1])+' - '+nrm(m[2]);}
  }
  // Telefoon — Belgisch nummer (9-10 cijfers, begint met 0)
  if(!rec.telefoon){
    m=all.match(/0\d[\d\s.\/-]{6,}/);
    if(m){
      let digits='',out='';
      for(const ch of m[0]){
        if(/\d/.test(ch)){ if(digits.length>=10)break; digits+=ch; out+=ch; }
        else { if(digits.length>=9)break; out+=ch; }
      }
      if(digits.length>=9) rec.telefoon=out.replace(/[\s.\/-]+$/,'');
    }
  }
  // Betaling — trefwoorden
  if(!rec.betaling){
    if(/factuur/i.test(all)) rec.betaling='factuur';
    else if(/volont/i.test(all)) rec.betaling='à volonté';
    else if(/\bcash\b/i.test(all)) rec.betaling='cash';
    else if(/\bbonnen\b/i.test(all)) rec.betaling='bonnen';
  }

  // Contactnaam — vóór het telefoonnr, na "via", of agressieve gok
  const STOP=/^(de|het|een|en|of|via|voor|vd|na|met|om|in|op|bij|aan|tot|per|pers|personen|man|mensen|pax|gasten|stuks|feest|feestje|verjaardag|combi|enkel|mail|zie|whatsapp|wagen|wagens|truck|friet|frituur|hamburger|burger|pizza|pasta|snack|snacks|drank|saus|verhuur|levering|leveren|levert|container|containers|pot|avond|avondshift|shift|nodig|voorzien|gaat|gaan|komt|komen|komst|niet|wel|nog|dag|dagen|tussen|circa|ongeveer|factuur|cash|bonnen|volonte|sweet|tap|ijs|nieuw|nieuwe|grote|kleine|tel|gsm|tegen|afhaal|geel|mol|olen|balen|kontich|mechelen|lommel|beerse|oevel|donk|temse|willebroek|antwerpen|turnhout|herentals|kasterlee|laakdal|westerlo)$/i;
  const INFIX=/^(de|van|den|der|het|'t|vande|vanden)$/i;
  if(!rec.naam && rec.telefoon){
    const before=all.slice(0,all.indexOf(rec.telefoon)).trim().split(/\s+/).filter(Boolean);
    const nm=[];
    for(let i=before.length-1;i>=0 && nm.length<3;i--){
      const w=before[i];
      if(/^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ.'-]+$/.test(w) && !STOP.test(w)) nm.unshift(w);
      else if(nm.length && INFIX.test(w)) nm.unshift(w);
      else break;
    }
    while(nm.length && INFIX.test(nm[0])) nm.shift();
    if(nm.length) rec.naam=nm.join(' ');
  }
  if(!rec.naam){
    m=all.match(/\bvia\s+([A-Za-zÀ-ÿ][a-zà-ÿ'.-]+(?:\s+[A-Za-zÀ-ÿ][a-zà-ÿ'.-]+){1,2})/i);
    if(m) rec.naam=m[1].trim();
  }
  if(!rec.naam){
    // agressieve gok — langste reeks naam-achtige woorden
    let best=[],run=[];
    for(let w of all.trim().split(/\s+/)){
      w=w.replace(/[^A-Za-zÀ-ÿ'-]/g,'');
      if((w.length>=3 && !STOP.test(w)) || (run.length && INFIX.test(w))) run.push(w);
      else { if(run.length>best.length) best=run.slice(); run=[]; }
      if(run.length>=3){ if(run.length>best.length) best=run.slice(); run=[]; }
    }
    if(run.length>best.length) best=run.slice();
    while(best.length && INFIX.test(best[0])) best.shift();
    while(best.length && INFIX.test(best[best.length-1])) best.pop();
    if(best.length) rec.naam=best.join(' ');
  }

  // Plaats / adres — uit het location-veld (als er nog geen label was)
  if(!rec.plaats && loc){
    if(/\b[1-9]\d{3}\b/.test(loc) || /\b(straat|laan|plein|weg|baan|dreef|steenweg|markt)\b/i.test(loc)){
      rec.plaats=loc.replace(/^.*?adres\s*(?:is)?\s*:?\s*/i,'').trim() || loc;
    } else {
      const infoKw=/\b(pers|personen|man|mensen|pax|gasten|stuks|factuur|cash|bonnen|volont|via|combi|mail|whatsapp|zie|meepakken|voorzien|shift|snack|drank|saus|friet|enkel|mogelijk)\b/i;
      if(loc.split(/\s+/).length<=3 && !infoKw.test(loc) && !/\d/.test(loc)) rec.plaats=loc;
    }
  }
  // Wat in het location-veld stond maar geen plaats is = losse info
  if(loc && !rec.plaats) rec.info=loc;

  // Betaling normaliseren naar de keuzelijst-waarden
  if(rec.betaling){
    const b=rec.betaling.toLowerCase();
    rec.betaling = /factuur/.test(b)?'factuur' : /volont/.test(b)?'à volonté'
                 : /cash|contant/.test(b)?'cash' : /bonn/.test(b)?'bonnen' : rec.betaling;
  }
  return rec;
}

// Firebase-sleutels mogen geen . # $ [ ] / bevatten — import-id's uit
// de Planning kunnen een decimaal hebben, daarom saneren we het id.
function detailKey(id){ return String(id).replace(/[.#$/\[\]]/g,'_'); }
function toArray(data){ return !data ? [] : (Array.isArray(data)?data:Object.values(data)); }

// ── LAADLIJST-KOPPELING ────────────────────────────────────────
// De laadlijst-PDF's worden in de Planning per event+wagen geüpload.
// Hier zoeken we de laadlijst die bij dit event én deze foodtruck hoort.
function findLaadlijst(eventId, truck){
  for(const [k,ll] of Object.entries(laadlijsten)){
    if(ll && String(ll.eventId)===String(eventId) && ll.wagen===truck) return {key:k, ll};
  }
  return null;
}
// Statusregels voor de QR-sectie in het fiche-detail
function qrTruckRows(e){
  const trucks = Array.isArray(e.trucks) ? e.trucks : [];
  if(!trucks.length)
    return '<div class="info-hint">Nog geen foodtrucks toegewezen in de Planning.</div>';
  return trucks.map(t=>{
    const f = findLaadlijst(e.id, t);
    return `<div class="qr-truck-row">
      <span class="qr-truck-name">🚚 ${esc(t)}</span>
      ${f
        ? '<span class="qr-truck-tag ok">✅ Laadlijst — QR komt in de Word-fiche</span>'
        : '<span class="qr-truck-tag">⚠ Geen laadlijst — upload de PDF in de Planning</span>'}
    </div>`;
  }).join('');
}

// ── SAMENVOEGEN ────────────────────────────────────────────────
// Eén agenda-event uit de Planning + zijn operationele laag → ops-event
function mergeEvent(pe){
  const d = opsDetails[detailKey(pe.id)] || {};
  const datum = pe.startDate || '';
  let status = d.status;
  if(!status){
    const t = todayISO();
    status = !datum ? 'komend' : datum < t ? 'afgerond' : datum === t ? 'vandaag' : 'komend';
  }
  const mw = Array.isArray(d.medewerkers) && d.medewerkers.length ? d.medewerkers : [emptyMw()];
  // Classificeer info die los in naam/locatie/notities staat
  const rec = recognize(pe.name, pe.location, pe.notes);
  return {
    id: pe.id,
    datum,
    endDate: pe.endDate || datum,
    evenement: pe.name || '',
    adres: d.adres !== undefined ? d.adres : (rec.plaats || ''),
    planningLocatie: pe.location || '',
    trucks: Array.isArray(pe.trucks) ? pe.trucks : [],
    agendaInfo: pe.notes || '',
    contact: d.contact || rec.naam || '',
    gsm: d.gsm || rec.telefoon || '',
    openingsuren: d.openingsuren || rec.uren || '',
    aantallen: d.aantallen || rec.personen || '',
    betaling: d.betaling || rec.betaling || '',
    wagen: d.wagen || '',
    wagenUitladen: typeof d.wagenUitladen==='boolean' ? (d.wagenUitladen?'Ja':'') : (d.wagenUitladen||''),
    wagenMeebrengen: d.wagenMeebrengen === undefined ? true : !!d.wagenMeebrengen,
    opmerkingen: d.opmerkingen || '',
    medewerkers: mw,
    recognized: rec,
    status
  };
}

function rebuild(){
  allEvents = planningEvents.filter(pe=>pe && pe.id!=null).map(mergeEvent);
  const st=document.getElementById('sync-status');
  if(st) st.textContent=`📋 ${allEvents.length} events uit Planning`;
  // Niet her-renderen terwijl iemand een fiche aan het bewerken is
  if(document.getElementById('page-detail').style.display!=='block'){
    renderPage(curPage);
  }
}

// ── FIREBASE LISTENERS ─────────────────────────────────────────
function listen(){
  fbdb.ref(PLAN_PATH).on('value', snap=>{
    planningEvents = toArray(snap.val());
    rebuild();
  }, err=>{
    const st=document.getElementById('sync-status');
    if(st) st.textContent='⚠ Geen verbinding met Planning';
    console.warn('Firebase:',err);
  });
  fbdb.ref(OPS_PATH).on('value', snap=>{
    opsDetails = snap.val() || {};
    rebuild();
  });
  // Laadlijst-PDF's (geüpload in de Planning) — nodig voor de QR-codes
  fbdb.ref('ft_laadlijsten_v1').on('value', snap=>{
    laadlijsten = snap.val() || {};
    // Ververs alleen de QR-statuslijst als er een fiche open staat
    if(editing && document.getElementById('page-detail').style.display==='block'){
      const list = document.getElementById('qr-truck-list');
      if(list) list.innerHTML = qrTruckRows(editing);
    }
  });
}

function newBlankEvent(){
  return{id:'new_'+Date.now(),datum:'',evenement:'',adres:'',planningLocatie:'',contact:'',gsm:'',openingsuren:'',
    aantallen:'',betaling:'',wagen:'',trucks:[],agendaInfo:'',recognized:{},wagenUitladen:'',wagenMeebrengen:true,
    opmerkingen:'',medewerkers:[emptyMw()],status:'komend'};
}

function showPage(p){
  curPage=p;
  ['dashboard','events','planning','detail'].forEach(x=>{
    document.getElementById('page-'+x).style.display='none';
  });
  ['dashboard','events','planning'].forEach(x=>{
    document.getElementById('nav-'+x)?.classList.toggle('active',x===p);
  });

  renderPage(p);
}

function renderPage(p){
  if(p==='dashboard') renderDash();
  else if(p==='events') renderEvents();
  else if(p==='planning') renderPlanning();
}

function renderDash(){
  const el=document.getElementById('page-dashboard');

  const needsOps=allEvents.filter(e=>e.datum>=today&&(!e.wagen||e.medewerkers.every(m=>!m.naam)));

  let html=`<div class="page-header">
    <div><div class="page-title">Dashboard</div>
    <div class="page-sub">${new Date().toLocaleDateString('nl-BE',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div>
    <button class="new-event-btn" onclick="openNew()">+ Nieuw event</button>
  </div>`;

  if(todayEvs.length>0){
    html+=`<div class="today-banner">
      <div style="font-size:28px">🚚</div>
      <div>
        <div style="font-size:15px;font-weight:700">Vandaag op de weg: ${todayEvs.length} event${todayEvs.length>1?'s':''}</div>
        <div style="font-size:13px;opacity:.8;margin-top:3px">${todayEvs.map(e=>esc(e.evenement)).join(' · ')}</div>
      </div>
    </div>`;
  }

  html+=`<div class="stat-grid">
    <div class="stat-card accent">
      <div class="stat-label">Vandaag</div>
      <div class="stat-val">${todayEvs.length}</div>
      <div class="stat-sub">events actief</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Komende 7 dagen</div>
      <div class="stat-val">${week.length}</div>
      <div class="stat-sub">events gepland</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Totaal events</div>
      <div class="stat-val">${allEvents.length}</div>
      <div class="stat-sub">uit de Planning</div>
    </div>
    <div class="stat-card">
      <div class="stat-label" style="color:${needsOps.length>0?'var(--orange)':'var(--muted)'}">Nog in te vullen</div>
      <div class="stat-val" style="color:${needsOps.length>0?'var(--orange)':'var(--dark)'}">${needsOps.length}</div>
      <div class="stat-sub">wagen/ploeg ontbreekt</div>
    </div>
  </div>`;

  if(needsOps.length>0){
    html+=`<div class="section-heading">⚠️ Operationele details nog in te vullen</div><div class="events-list">`;
    for(const e of needsOps.slice(0,4)) html+=eRow(e);
    html+=`</div>`;

  html+=`<div class="section-heading" style="margin-top:${needsOps.length>0?'20px':'0'}">📅 Volgende events</div>
  <div class="events-list">`;

    html+=`<div class="empty-state">
      <div style="font-size:40px;margin-bottom:12px">📭</div>
      <p>Geen komende events in de Planning.</p>
    </div>`;
  } else {
    for(const e of upcoming) html+=eRow(e);
  }
  html+=`</div>`;
  el.innerHTML=html;

function eRow(e){
  const staff=e.medewerkers.filter(m=>m.naam).length;
  const warnWagen=!e.wagen;
  const warnStaff=staff===0;
  return `<div class="event-row" onclick="openDetail('${e.id}')">
    <div>
      <div class="event-date-month">${e.datum?fmtMY(e.datum):''}</div>
      <div class="event-date-day">${e.datum?fmtDay(e.datum)+' '+DAYS[new Date(e.datum).getDay()]:'—'}</div>
    </div>
    <div>
      <div class="event-name">${esc(e.evenement)||'(naamloos)'}</div>

    </div>

      <div style="font-size:13px;font-weight:500;color:${warnWagen?'#c8a090':'var(--dark)'}">${e.wagen?'🚚 '+esc(e.wagen):'<span style="color:#c8a090">Wagen?</span>'}</div>
      <div style="font-size:12px;color:${warnStaff?'#c8a090':'var(--muted)'};margin-top:2px">${staff>0?staff+' medewerker'+(staff!==1?'s':''):'<span style="color:#c8a090">Ploeg?</span>'}</div>

function renderEvents(){
  const el=document.getElementById('page-events');
  const sorted=[...allEvents].sort((a,b)=>a.datum.localeCompare(b.datum));
  let html=`<div class="page-header">
    <div><div class="page-title">Alle events</div><div class="page-sub">${allEvents.length} events uit de Planning</div></div>
    <button class="new-event-btn" onclick="openNew()">+ Nieuw event</button>
  </div>
  <div class="filter-bar">
    <input class="search-box" id="srch" placeholder="Zoek op naam of adres…" oninput="filterEvs()"/>
    <button class="filter-btn active" id="f-alle" onclick="setF('alle')">Alle</button>
    <button class="filter-btn" id="f-komend" onclick="setF('komend')">Komend</button>
    <button class="filter-btn" id="f-afgerond" onclick="setF('afgerond')">Afgerond</button>
  </div>
  <div id="ev-list" class="events-list">`;
  if(sorted.length===0){
    html+=`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📭</div><p>Nog geen events in de Planning.</p></div>`;
  } else {
    for(const e of sorted) html+=eRow(e);
  }
  html+=`</div>`;
  el.innerHTML=html;
  document.getElementById('f-'+activeFilter)?.classList.add('active');
}

function setF(f){
  activeFilter=f;
  ['alle','komend','afgerond'].forEach(x=>document.getElementById('f-'+x)?.classList.toggle('active',x===f));
  filterEvs();
}
function filterEvs(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const list=document.getElementById('ev-list'); if(!list) return;
  const sorted=[...allEvents].sort((a,b)=>a.datum.localeCompare(b.datum));
  const filtered=sorted.filter(e=>{
    const mq=!q||e.evenement.toLowerCase().includes(q)||(e.adres||'').toLowerCase().includes(q);
    const mf=activeFilter==='alle'||e.status===activeFilter;
    return mq&&mf;
  });
  list.innerHTML=filtered.length===0
    ?`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🔍</div><p>Geen resultaten.</p></div>`
    :filtered.map(eRow).join('');
}

function renderPlanning(){
  const el=document.getElementById('page-planning');
  const today=todayISO();
  const upcoming=allEvents.filter(e=>e.datum>=today).sort((a,b)=>a.datum.localeCompare(b.datum));
  const sm={};
  for(const ev of upcoming) for(const m of ev.medewerkers) if(m.naam){if(!sm[m.naam])sm[m.naam]=[];sm[m.naam].push(ev);}

  let html=`<div class="page-header">
    <div><div class="page-title">Personeelsplanning</div><div class="page-sub">Overzicht per medewerker</div></div>
  </div>`;

  if(Object.keys(sm).length===0){
    html+=`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">👥</div><p>Nog geen medewerkers ingevuld. Open een event en vul de ploeg in.</p></div>`;
  } else {
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">`;
    for(const [naam,evs] of Object.entries(sm).sort()){
      const initials=naam.slice(0,2).toUpperCase();
      html+=`<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden">
        <div style="background:var(--dark);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${esc(initials)}</div>
          <div>
            <div style="font-weight:600;font-size:14px">${esc(naam)}</div>

          </div>
        </div>

      for(const ev of evs){
        html+=`<div onclick="openDetail('${ev.id}')" style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:center">
          <div style="width:38px;height:38px;background:var(--orange-light);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <div style="font-size:14px;font-weight:700;color:var(--orange)">${fmtDay(ev.datum)}</div>

          </div>

            <div style="font-size:11px;color:var(--muted)">${esc(ev.openingsuren)||'uren onbekend'}</div>
          </div>
        </div>`;
      }
      html+=`</div></div></div>`;
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function openDetail(id){
  const src=allEvents.find(e=>String(e.id)===String(id));
  if(!src) return;
  editing=JSON.parse(JSON.stringify(src));
  renderDetail();
  ['dashboard','events','planning'].forEach(p=>document.getElementById('page-'+p).style.display='none');
  document.getElementById('page-detail').style.display='block';
}

function openNew(){
  editing=newBlankEvent();
  renderDetail();
  ['dashboard','events','planning'].forEach(p=>document.getElementById('page-'+p).style.display='none');
  document.getElementById('page-detail').style.display='block';
}

          </div>
        </div>
        <div class="info-field col-full">
          <label>Opmerkingen</label>
          <textarea oninput="upd('opmerkingen',this.value)" placeholder="Speciale instructies, bonnen, borg, wateremmer, veiligheidsinstructies…">${esc(e.opmerkingen)}</textarea>
        </div>
      </div>

      <div class="divider"></div>
      <div class="section-heading" style="margin-top:0">📲 Eindstock-QR per foodtruck</div>
      <div class="info-hint" style="margin-bottom:10px">Elke foodtruck met een geüploade laadlijst krijgt een eigen QR-code in de Word-fiche. De medewerker scant die op het einde van het event om de eindstock in te vullen — de aantallen verschijnen daarna op het dashboard.</div>
      <div id="qr-truck-list">${qrTruckRows(e)}</div>

      <div class="divider"></div>
      <div class="section-heading" style="margin-top:0">👥 Medewerkers & uren</div>
      <table class="staff-table">
        <thead><tr>
          <th style="width:150px">Naam</th>
          <th>Vertrek Senor</th>
          <th>Aankomst event</th>
          <th>Vertrek event</th>
          <th>Aankomst Senor</th>
          <th style="width:40px"></th>
        </tr></thead>
        <tbody id="staff-body">${staffRows}</tbody>
      </table>
      <button class="add-row-btn" onclick="addMw()">+ Medewerker toevoegen</button>

    </div>
    <div class="save-bar">
      <button class="cancel-btn" onclick="goBack()">Annuleer</button>
      <div style="display:flex;align-items:center;gap:10px">
        ${!isNew?`<button class="cancel-btn" onclick="delEvent('${e.id}')" style="color:var(--red);border-color:#f7c1c1">Verwijder</button>`:''}
        <button class="cancel-btn" onclick="generateWord()" style="color:var(--blue);border-color:#b3d1f0;display:flex;align-items:center;gap:6px">📄 Fiche als Word</button>
        <button class="save-btn" onclick="saveEvent()">💾 Opslaan</button>
      </div>
    </div>
  </div>`;
}

function upd(k,v){if(editing){editing[k]=v;
  if(k==='wagenMeebrengen'){const l=document.getElementById('lbl-meebrengen');if(l)l.textContent=v?'Ja':'Nee';}
}}
function updMw(i,k,v){if(editing)editing.medewerkers[i][k]=v;}
function addMw(){if(!editing)return;editing.medewerkers.push(emptyMw());renderDetail();document.getElementById('page-detail').style.display='block';}
function removeMw(i){
  if(!editing)return;
  editing.medewerkers.splice(i,1);
  if(!editing.medewerkers.length)editing.medewerkers.push(emptyMw());
  renderDetail();document.getElementById('page-detail').style.display='block';
}

async function saveEvent(){
  if(!editing)return;
  const e=editing;
  if(!e.evenement.trim()){toast('✗ Vul een naam voor het event in.',false);return;}
  const isNew=String(e.id).startsWith('new_');
  let pid=e.id;

  // 1. Agenda-velden terug naar de gedeelde Planning
  if(isNew){
    pid=Date.now();
    planningEvents.push({
      id:pid,name:e.evenement.trim(),location:e.adres||'',
      startDate:e.datum||'',endDate:e.datum||'',trucks:[],color:'#0078D4'
    });
  } else {
    const pe=planningEvents.find(x=>String(x.id)===String(e.id));
    if(pe){
      // Bewaar de duur van een meerdaags event bij een datumwijziging
      let endDate=pe.endDate||pe.startDate||e.datum;
      if(pe.startDate&&e.datum&&pe.startDate!==e.datum){
        const delta=new Date(e.datum)-new Date(pe.startDate);
        endDate=new Date(new Date(pe.endDate||pe.startDate).getTime()+delta).toISOString().slice(0,10);
      }
      pe.name=e.evenement.trim();
      pe.startDate=e.datum||'';
      pe.endDate=endDate;
      // pe.location blijft ongemoeid — dat is het planning-infoveld,
      // het ops-adres wordt apart in ops_details bewaard.
    }
  }
  try{
    await fbdb.ref(PLAN_PATH).set(planningEvents);
    // 2. Operationele laag in ops_details
    const mw=(e.medewerkers||[]).filter(m=>m.naam||m.vertrekSenor||m.aankomstEvent||m.vertrekEvent||m.aankomstSenor);
    await fbdb.ref(OPS_PATH+'/'+detailKey(pid)).set({
      adres:e.adres||'',contact:e.contact||'',gsm:e.gsm||'',
      openingsuren:e.openingsuren||'',aantallen:e.aantallen||'',
      betaling:e.betaling||'',wagen:e.wagen||'',wagenUitladen:e.wagenUitladen||'',
      wagenMeebrengen:!!e.wagenMeebrengen,opmerkingen:e.opmerkingen||'',
      medewerkers:mw,status:e.status||''
    });
    toast('✓ Opgeslagen — ook zichtbaar in de Planning.');
  }catch(err){
    toast('✗ Opslaan mislukt: '+err.message,false);
    return;
  }
  // Fiche blijft open na het opslaan.
  if(isNew){
    // Een nieuw event heeft nu een vast id — opnieuw renderen zodat een
    // volgende 'Opslaan' dit event bijwerkt i.p.v. een duplicaat te maken.
    editing.id=pid;
    renderDetail();
    document.getElementById('page-detail').style.display='block';
  }
}

async function delEvent(id){
  if(!confirm('Dit event ook uit de Planning verwijderen?\n\nHet verdwijnt dan overal — ook bij de truck-planning.'))return;
  planningEvents=planningEvents.filter(e=>String(e.id)!==String(id));
  try{
    await fbdb.ref(PLAN_PATH).set(planningEvents);
    await fbdb.ref(OPS_PATH+'/'+detailKey(id)).remove();
    toast('Event verwijderd.');
  }catch(err){
    toast('✗ Verwijderen mislukt: '+err.message,false);
    return;
  }
  goBack();
}

function goBack(){
  editing=null;
  document.getElementById('page-detail').style.display='none';
  document.getElementById('page-'+curPage).style.display='block';
  renderPage(curPage);
}

// ── WORD GENERATIE ──────────────────────────────────────────
// De Word-fiche neemt ALLE agenda-info uit de Planning over:
// datum (incl. meerdaags bereik), evenement, adres en de in de
// Planning toegewezen wagen(s) — aangevuld met de operationele
// laag (contact, uren, betaling, ploeg, opmerkingen).
async function generateWord(){
  if(!editing){toast('✗ Geen event geselecteerd.',false);return;}
  const e=editing;
  if(!window.docx){toast('✗ Word-library nog niet geladen. Probeer opnieuw.',false);return;}

  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, ImageRun
  } = window.docx;

  // Datumopmaak
  function fmtWordDate(d){
    if(!d) return '';
    const dt=new Date(d+'T00:00:00');
    const dn=['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
    return `${dn[dt.getDay()]} ${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
  }

  // Helper: labelrij (bold label + gewone waarde)
  function labelPara(label, value, opts={}){
    const runs=[new TextRun({text:label+': ', bold:true, size:opts.size||22, font:'Arial'})];
    if(value) runs.push(new TextRun({text:String(value), size:opts.size||22, font:'Arial'}));
    return new Paragraph({spacing:{after:80}, children:runs});
  }

  // Helper: lege paragraf
  function emptyPara(after=80){
    return new Paragraph({spacing:{after}, children:[new TextRun({text:'',font:'Arial'})]});
  }

  // Tabel borders
  const bdr={style:BorderStyle.SINGLE,size:4,color:'AAAAAA'};
  const borders={top:bdr,bottom:bdr,left:bdr,right:bdr};

  // Kolombreedtes (A4 met ~10mm marges)
  const COL=[2200,2071,2072,2072,2071];

  // Header van personeelstabel
  const colLabels=['Medewerkers','Vertrek Señor','Aankomst event','Vertrek event','Aankomst Señor'];
  const headerRow=new TableRow({
    tableHeader:true,
    children:colLabels.map((h,i)=>new TableCell({
      borders,
      width:{size:COL[i],type:WidthType.DXA},
      shading:{fill:'1C1917',type:ShadingType.CLEAR},
      margins:{top:80,bottom:80,left:120,right:120},
      children:[new Paragraph({
        alignment:AlignmentType.CENTER,
        children:[new TextRun({text:h,bold:true,color:'FFFFFF',size:18,font:'Arial'})]
      })]
    }))
  });

  // Datarijen — minimum 8 rijen
  const mwLijst=(e.medewerkers||[]).filter(m=>m.naam||m.vertrekSenor||m.aankomstEvent||m.vertrekEvent||m.aankomstSenor);
  while(mwLijst.length<8) mwLijst.push({naam:'',vertrekSenor:'',aankomstEvent:'',vertrekEvent:'',aankomstSenor:''});

  const dataRows=mwLijst.map(m=>new TableRow({
    children:[m.naam,m.vertrekSenor,m.aankomstEvent,m.vertrekEvent,m.aankomstSenor].map((val,i)=>new TableCell({
      borders,
      width:{size:COL[i],type:WidthType.DXA},
      margins:{top:80,bottom:80,left:120,right:120},
      children:[new Paragraph({children:[new TextRun({text:val||'',size:20,font:'Arial'})]})]
    }))
  }));

  // Agenda-info uit de Planning
  const datumTxt = (e.endDate && e.endDate!==e.datum)
    ? `${fmtWordDate(e.datum)}  t/m  ${fmtWordDate(e.endDate)}`
    : fmtWordDate(e.datum);
  const planTrucks = Array.isArray(e.trucks) ? e.trucks.filter(Boolean) : [];

  // Wagen uitladen / meebrengen tekst
  const wagenUitTxt=e.wagenUitladen||'—';
  const wagenMeeTxt=e.wagenMeebrengen?'JA':'NEE';

  // ── QR-codes per foodtruck (eindstock-registratie) ──────────
  // Voor elke truck met een geüploade laadlijst maken we een QR die
  // naar eindstock.html?ll=<laadlijstKey> verwijst. De medewerker
  // scant die op het einde van het event en vult de eindstock in.
  function qrPngBytes(text){
    if(typeof QRCode==='undefined') return null;
    const holder=document.createElement('div');
    holder.style.cssText='position:fixed;left:-9999px;top:0;';
    document.body.appendChild(holder);
    try{
      new QRCode(holder,{text,width:260,height:260,correctLevel:QRCode.CorrectLevel.M});
      const canvas=holder.querySelector('canvas');
      if(!canvas) return null;
      const b64=canvas.toDataURL('image/png').split(',')[1];
      const bin=atob(b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      return bytes;
    }catch(err){ console.warn('QR genereren mislukt:',err); return null; }
    finally{ holder.remove(); }
  }

  const qrChildren=[];
  if(planTrucks.length){
    qrChildren.push(new Paragraph({
      pageBreakBefore:true, spacing:{before:0,after:100},
      border:{bottom:{style:BorderStyle.SINGLE,size:6,color:'D4521A',space:1}},
      children:[new TextRun({text:'EINDSTOCK — QR PER FOODTRUCK',bold:true,size:26,color:'1C1917',font:'Arial'})]
    }));
    qrChildren.push(new Paragraph({
      spacing:{after:180},
      children:[new TextRun({
        text:'Elke medewerker scant op het einde van het event de QR-code van zijn foodtruck en vult de eindstock in. De aantallen verschijnen automatisch op het dashboard.',
        size:18,italics:true,color:'666666',font:'Arial'})]
    }));
    for(const truck of planTrucks){
      const found=findLaadlijst(e.id,truck);
      qrChildren.push(new Paragraph({
        spacing:{before:160,after:50},
        children:[new TextRun({text:'🚚  '+truck,bold:true,size:24,font:'Arial'})]
      }));
      if(found){
        const bytes=qrPngBytes('https://operationssenorsnacks.web.app/eindstock.html?ll='+found.key);
        if(bytes && ImageRun){
          qrChildren.push(new Paragraph({
            spacing:{after:30},
            children:[new ImageRun({data:bytes,transformation:{width:132,height:132}})]
          }));
          qrChildren.push(new Paragraph({
            spacing:{after:120},
            children:[new TextRun({text:'Scan om de eindstock in te vullen',size:16,color:'888888',font:'Arial'})]
          }));
        } else {
          qrChildren.push(new Paragraph({
            spacing:{after:120},
            children:[new TextRun({text:'(QR-code kon niet gegenereerd worden)',size:16,italics:true,color:'A32D2D',font:'Arial'})]
          }));
        }
      } else {
        qrChildren.push(new Paragraph({
          spacing:{after:120},
          children:[new TextRun({text:'Nog geen laadlijst geüpload — doe dit in de Planning.',size:18,italics:true,color:'A32D2D',font:'Arial'})]
        }));
      }
    }
  }

  // ── Logo inladen (senorsnacks-logo.png) ────────────────────
  let logoBytes=null;
  try{
    const resp=await fetch('senorsnacks-logo.png');
    if(resp.ok) logoBytes=new Uint8Array(await resp.arrayBuffer());
  }catch(err){ console.warn('Logo laden mislukt:',err); }

  // Bouw document
  const doc=new Document({
    styles:{default:{document:{run:{font:'Arial',size:22}}}},
    sections:[{
      properties:{
        page:{
          size:{width:11906,height:16838},
          margin:{top:567,right:567,bottom:567,left:567}
        }
      },
      children:[
        // ── LOGO / WEBSITE
        (logoBytes && ImageRun)
          ? new Paragraph({
              alignment:AlignmentType.CENTER,
              spacing:{after:60},
              children:[new ImageRun({data:logoBytes,transformation:{width:212,height:139}})]
            })
          : new Paragraph({
              alignment:AlignmentType.CENTER,
              spacing:{after:40},
              children:[new TextRun({text:'SEÑOR SNACKS',bold:true,size:36,color:'D4521A',font:'Arial'})]
            }),
        new Paragraph({
          alignment:AlignmentType.CENTER,
          spacing:{after:200},
          children:[new TextRun({text:'www.senorsnacks.be',size:20,color:'888888',font:'Arial'})]
        }),

        // ── TITEL
        new Paragraph({
          spacing:{before:0,after:100},
          border:{bottom:{style:BorderStyle.SINGLE,size:6,color:'D4521A',space:1}},
          children:[new TextRun({text:'PERSONEELSFICHE',bold:true,size:26,color:'1C1917',font:'Arial'})]
        }),
        emptyPara(100),

        // ── BASISINFO (uit de agenda)
        labelPara('DATUM', datumTxt),
        labelPara('EVENEMENT', e.evenement),
        labelPara('ADRES', e.adres),
        emptyPara(60),
        labelPara('CONTACT', e.contact),
        labelPara('TELEFOON / GSM', e.gsm),
        labelPara('OPENINGSUREN', e.openingsuren),
        labelPara('VERWACHT AANTAL', e.aantallen),
        labelPara('BETALING', e.betaling ? e.betaling.charAt(0).toUpperCase()+e.betaling.slice(1) : ''),
        emptyPara(60),

        // ── INFO UIT DE AGENDA (Outlook-omschrijving)
        ...(e.agendaInfo ? [
          new Paragraph({
            spacing:{before:0,after:100},
            border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'DDDDDD',space:1}},
            children:[new TextRun({text:'INFO UIT DE AGENDA',bold:true,size:22,color:'555555',font:'Arial'})]
          }),
          emptyPara(60),
          new Paragraph({
            spacing:{after:200},
            children:[new TextRun({text:e.agendaInfo,size:22,font:'Arial'})]
          })
        ] : []),

        // ── WAGEN & LOGISTIEK
        new Paragraph({
          spacing:{before:0,after:100},
          border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'DDDDDD',space:1}},
          children:[new TextRun({text:'WAGEN & LOGISTIEK',bold:true,size:22,color:'555555',font:'Arial'})]
        }),
        emptyPara(60),
        labelPara('Wagen', e.wagen || planTrucks.join(', ')),
        ...(planTrucks.length && e.wagen ? [labelPara('Volgens planning', planTrucks.join(', '))] : []),
        labelPara('Wagen uitladen', wagenUitTxt),
        labelPara('Wagen meebrengen', wagenMeeTxt),
        emptyPara(60),

        // ── OPMERKINGEN (duidelijk gemarkeerd in een groot kader)
        emptyPara(120),
        new Table({
          width:{size:10486,type:WidthType.DXA},
          columnWidths:[10486],
          rows:[new TableRow({children:[new TableCell({
            borders:{
              top:{style:BorderStyle.SINGLE,size:24,color:'D4521A'},
              bottom:{style:BorderStyle.SINGLE,size:24,color:'D4521A'},
              left:{style:BorderStyle.SINGLE,size:24,color:'D4521A'},
              right:{style:BorderStyle.SINGLE,size:24,color:'D4521A'}
            },
            shading:{fill:'FFF1E6',type:ShadingType.CLEAR},
            margins:{top:200,bottom:200,left:240,right:240},
            children:[
              new Paragraph({
                spacing:{after:120},
                children:[new TextRun({text:'⚠  OPMERKINGEN',bold:true,size:30,color:'D4521A',font:'Arial'})]
              }),
              new Paragraph({
                children:[new TextRun({text:e.opmerkingen||'/',bold:true,size:26,color:'1C1917',font:'Arial'})]
              })
            ]
          })]})]
        }),
        emptyPara(240),

        // ── VASTE SLUITINGSTEKST
        new Paragraph({
          spacing:{after:200},
          children:[new TextRun({
            text:'Sluiten: Steeds in overleg met de organisatie! Voor je de klep sluit ALTIJD met de organisatie bespreken. Indien het zeer rustig is ook even de organisatie op de hoogte brengen dat je gaat sluiten.',
            size:18,italics:true,color:'666666',font:'Arial'
          })]
        }),

        // ── MEDEWERKERS
        new Paragraph({
          spacing:{before:0,after:120},
          border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'DDDDDD',space:1}},
          children:[new TextRun({text:'MEDEWERKERS & UREN',bold:true,size:22,color:'555555',font:'Arial'})]
        }),
        emptyPara(80),
        new Table({
          width:{size:10486,type:WidthType.DXA},
          columnWidths:COL,
          rows:[headerRow,...dataRows]
        }),

        emptyPara(300),

        // ── VOETTEKST
        new Paragraph({
          alignment:AlignmentType.CENTER,
          border:{top:{style:BorderStyle.SINGLE,size:4,color:'DDDDDD',space:1}},
          spacing:{before:100},
          children:[new TextRun({
            text:'SENOR SNACKS BVBA · Winkelom 87c · 2440 Geel · tel 014/58 76 56 · BE465 570 997 · KBC: BE39 7330 4242 6719',
            size:16,color:'888888',font:'Arial'
          })]
        }),

        // ── QR-CODES PER FOODTRUCK (eigen pagina)
        ...qrChildren
      ]
    }]
  });

  try{
    const blob=await Packer.toBlob(doc);
    const safeName=(e.evenement||'event').replace(/[^a-zA-Z0-9]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    const dateStr=(e.datum||'').replace(/-/g,'');
    saveAs(blob,`Fiche_${safeName}_${dateStr}.docx`);
    toast('✓ Word-fiche gedownload.');
  }catch(err){
    console.error(err);
    toast('✗ Word genereren mislukt: '+err.message,false);
  }
}

renderPage('dashboard');
listen();
</script>
