<!-- Extra code-gate specifiek voor de audit-log (bovenop de algemene toegangscode). -->
<script>
(function () {
  var KEY = 'senorsnacks_audit_v1';
  var CODE = '1973';
  try { if (localStorage.getItem(KEY) === CODE) return; } catch (e) {}

  var hide = document.createElement('style');
  hide.id = '__audit_hide';
  hide.textContent = 'body>*:not(#__audit_overlay){visibility:hidden!important}';
  (document.head || document.documentElement).appendChild(hide);

  function build() {
    if (document.getElementById('__audit_overlay')) return;
    if (!document.body) { return setTimeout(build, 10); }
    var ov = document.createElement('div');
    ov.id = '__audit_overlay';
    ov.style.cssText = [
      'position:fixed', 'inset:0', 'z-index:2147483647',
      'background:#fdf8f0', 'display:flex', 'align-items:center',
      'justify-content:center', 'padding:1rem',
      'font-family:-apple-system,BlinkMacSystemFont,Inter,"Segoe UI",sans-serif',
      'color:#3a2415'
    ].join(';');
    ov.innerHTML =
      '<div style="text-align:center;max-width:340px;width:100%">' +
        '<img src="/senorsnacks-logo.png" alt="Senor Snacks" style="width:110px;height:auto;margin:0 auto 1.25rem;display:block"/>' +
        '<h1 style="margin:0 0 6px;font-size:22px;font-weight:700;letter-spacing:-.01em">Audit Log</h1>' +
        '<p style="margin:0 0 1.5rem;color:#7a5a40;font-size:14px;line-height:1.5">Deze pagina is extra beveiligd. Voer de audit-code in.</p>' +
        '<input id="__audit_input" type="password" inputmode="numeric" autocomplete="off" autocapitalize="off" placeholder="• • • •" ' +
          'style="width:100%;padding:14px;font-size:20px;text-align:center;border:1px solid rgba(120,60,20,.22);border-radius:10px;background:#fff;color:#3a2415;outline:none;letter-spacing:.4em;font-family:monospace;box-sizing:border-box;transition:border-color .15s,background .15s,box-shadow .15s"/>' +
        '<button id="__audit_btn" style="margin-top:12px;width:100%;padding:13px;font-size:14px;font-weight:600;background:#e8662b;color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;box-shadow:0 1px 3px rgba(232,102,43,.3);transition:background .12s">Open</button>' +
        '<div id="__audit_err" style="margin-top:10px;font-size:12px;color:#7a2818;min-height:16px;font-weight:500"></div>' +
        '<div style="margin-top:1.5rem;font-size:11px;color:#b89878">Je toestel onthoudt de toegang.</div>' +
      '</div>';
    document.body.appendChild(ov);

    var inp = document.getElementById('__audit_input');
    var btn = document.getElementById('__audit_btn');
    var err = document.getElementById('__audit_err');
    setTimeout(function () { try { inp.focus(); } catch (e) {} }, 50);

    function unlock() {
      try { localStorage.setItem(KEY, CODE); } catch (e) {}
      ov.remove();
      var s = document.getElementById('__audit_hide'); if (s) s.remove();
    }
    function reject() {
      err.textContent = 'Onjuiste code';
      inp.value = '';
      inp.style.borderColor = '#f0a896';
      inp.style.background = '#fde2dd';
      inp.style.boxShadow = '0 0 0 3px rgba(240,168,150,.3)';
      setTimeout(function () {
        inp.style.borderColor = 'rgba(120,60,20,.22)';
        inp.style.background = '#fff';
        inp.style.boxShadow = 'none';
        err.textContent = '';
        try { inp.focus(); } catch (e) {}
      }, 1200);
    }
    function check() {
      var v = (inp.value || '').trim();
      if (v === CODE) unlock(); else reject();
    }
    btn.onclick = check;
    btn.onmouseover = function () { btn.style.background = '#d05420'; };
    btn.onmouseout = function () { btn.style.background = '#e8662b'; };
    inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') check(); });
    inp.addEventListener('focus', function () {
      inp.style.borderColor = '#e8662b';
      inp.style.boxShadow = '0 0 0 3px #fef0e2';
    });
    inp.addEventListener('blur', function () {
      if (inp.style.background !== 'rgb(253, 226, 221)') {
        inp.style.borderColor = 'rgba(120,60,20,.22)';
        inp.style.boxShadow = 'none';
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', build);
  } else {
    build();
  }
})();
</script>

};
const CAT_KEYS = Object.keys(CATS);
let activeCats = new Set(CAT_KEYS);

// Ruwe bron-data
let src = { ops:{}, notities:{}, eindstock:{}, poetsHist:{}, prio:{}, planning:{}, activity:{}, laadlijsten:{}, ai:{}, deletions:{} };
let events = [];      // genormaliseerde audit-events
const loaded = {};    // welke bronnen al binnen zijn

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function tsFrom(v){
  if (v == null) return 0;
  if (typeof v === 'number') return v;
  const n = Date.parse(v);
  return isNaN(n) ? 0 : n;
}
function fmtDateTime(ts){
  if (!ts) return '<span class="d">—</span>';
  const d = new Date(ts);
  return '<span class="d">'+d.toLocaleDateString('nl-NL')+'</span> '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
}
function fmtShort(ts){
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('nl-NL',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
}
// Parse een logregel als "01/06/2026 14:20 — bewerkt door Jan"
// Geeft een opgeschoonde actie (zonder "door X"), de persoon, en een
// gestructureerde detail-regel terug zodat edit-events leesbaar zijn.
function parseLogLine(line, fallbackTs, truck){
  const m = String(line).match(/^\s*(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})\s+(\d{1,2}):(\d{2})\s*[—\-–]\s*(.*)$/);
  let ts = fallbackTs, rest = String(line);
  if (m){
    let yr = parseInt(m[3],10); if (yr < 100) yr += 2000;
    ts = new Date(yr, parseInt(m[2],10)-1, parseInt(m[1],10), parseInt(m[4],10), parseInt(m[5],10)).getTime();
    rest = m[6];
  }
  rest = rest.trim();
  // Persoon uit "door X" halen
  const pm = rest.match(/\bdoor\s+([^,—–]+?)(?:\s+op\b|[,.;]|$)/i);
  const person = pm ? pm[1].trim() : '';
  // "door X" uit de actie strippen zodat alleen wat-er-gebeurde overblijft
  let action = rest.replace(/\bdoor\s+[^,—–]+?(?=\s+op\b|[,.;]|$)/i, '').replace(/\s{2,}/g,' ').replace(/[\s,]+$/,'').trim();
  if (!action) action = rest;
  // Eerste letter een hoofdletter geven
  if (action) action = action.charAt(0).toUpperCase() + action.slice(1);
  return { ts, action, person, raw: rest };
}
// Leesbaar toestel uit een user-agent ("Chrome op Windows", "Safari op iPhone")
function deviceFromUA(ua){
  ua = String(ua || '');
  if (!ua) return '';
  let browser = 'browser';
  if (/Edg\//.test(ua))               browser = 'Edge';
  else if (/OPR\/|Opera/.test(ua))    browser = 'Opera';
  else if (/Chrome\//.test(ua))       browser = 'Chrome';
  else if (/Firefox\//.test(ua))      browser = 'Firefox';
  else if (/Safari\//.test(ua))       browser = 'Safari';
  let os = '';
  if (/iPhone/.test(ua))              os = 'iPhone';
  else if (/iPad/.test(ua))           os = 'iPad';
  else if (/Android/.test(ua))        os = 'Android';
  else if (/Windows/.test(ua))        os = 'Windows';
  else if (/Mac OS X|Macintosh/.test(ua)) os = 'Mac';
  else if (/Linux/.test(ua))          os = 'Linux';
  return os ? browser + ' op ' + os : browser;
}
function providerLabel(p){
  p = String(p || '');
  if (/google/i.test(p)) return 'Google';
  if (/password/i.test(p)) return 'e-mail';
  if (p) return p.replace(/\.com$/,'');
  return '';
}

// ─────────────────────────────────────────────────────────────
// NORMALISATIE → events[]
// ─────────────────────────────────────────────────────────────
function rebuild(){
  const ev = [];

  // 1) Check-ins (ft_ops_v2): check-in zelf + log-regels + defect + poets
  Object.values(src.ops || {}).forEach(c => {
    if (!c || !c.id) return;
    const truck = c.truck || 'Onbekende truck';
    // De check-in zelf
    ev.push({
      ts: c.timestamp || 0, cat: 'checkin', person: c.employee || 'Onbekend',
      action: 'Check-in', target: truck,
      detail: [(c.statuses||[]).join(', '), c.notes, c.kantoorNote].filter(Boolean).join(' · ')
    });
    // Defect gemeld (zichtbaar zolang open of via log) — toon als event op check-in-tijd
    if (c.hasDefect && (c.defectWat || c.defectText)){
      ev.push({
        ts: c.timestamp || 0, cat: 'defect-open', person: c.employee || 'Onbekend',
        action: 'Defect gemeld', target: truck,
        detail: [c.defectWat, c.defectText].filter(Boolean).join(' — ')
      });
    }
    // Defect opgelost
    if (c.defectResolvedAt){
      ev.push({
        ts: c.defectResolvedAt, cat: 'defect-resolved', person: c.defectResolvedBy || 'Onbekend',
        action: 'Defect opgelost', target: truck, detail: c.defectWat || ''
      });
    }
    // Poetsbeurt rechtstreeks op check-in
    if (c.cleanedAt){
      ev.push({ ts: c.cleanedAt, cat: 'poets', person: c.employee || 'Poets', action: 'Gepoetst', target: truck, detail: 'bij check-in' });
    }
    // Logboek-regels (bewerkingen, markeringen…)
    (c.log || []).forEach(line => {
      const p = parseLogLine(line, c.timestamp || 0, truck);
      ev.push({
        ts: p.ts, cat: 'edit', person: p.person || '—',
        action: p.action || String(line), target: truck,
        // Toon de ruwe regel alleen als detail wanneer die meer bevat dan de actie
        detail: (p.raw && p.raw.toLowerCase() !== (p.action||'').toLowerCase()) ? p.raw : ''
      });
    });
  });

  // 2) Notities (ft_notities_v1)
  Object.entries(src.notities || {}).forEach(([k, n]) => {
    if (!n) return;
    // Hoofd-notitie event — label hangt af van flags (stuk en/of bestel — historisch)
    const wasBestel = n.tebestellen === true || !!n.besteldAt;
    let baseAction = 'Notitie';
    if (n.broken && wasBestel) baseAction = 'Notitie (stuk + te bestellen)';
    else if (n.broken)         baseAction = 'Notitie (stuk gemeld)';
    else if (wasBestel)        baseAction = 'Notitie (te bestellen)';
    ev.push({
      ts: n.ts || tsFrom(n.date), cat: 'notitie', person: n.name || 'Onbekend',
      action: baseAction, target: n.event || '',
      detail: n.text || ''
    });
    // Bestelling — open: aparte entry op aanmaak-tijd
    if (n.tebestellen === true){
      ev.push({
        ts: n.ts || tsFrom(n.date), cat: 'bestel-open', person: n.name || 'Onbekend',
        action: 'Te bestellen gemeld', target: n.event || '', detail: n.text || ''
      });
    }
    // Bestelling — afgevinkt als besteld: zelfde categorie, op besteldAt-tijd
    if (n.besteldAt){
      ev.push({
        ts: n.besteldAt, cat: 'bestel-open', person: n.besteldBy || 'Onbekend',
        action: '✓ Besteld', target: n.event || '', detail: n.text || ''
      });
    }
    if (n.resolvedAt){
      ev.push({
        ts: n.resolvedAt, cat: 'stuk-resolved', person: n.resolvedBy || 'Onbekend',
        action: 'Stuk opgelost', target: n.event || '', detail: n.text || ''
      });
    }
  });

  // 3) Eindstock (ft_eindstock_v1)
  Object.values(src.eindstock || {}).forEach(es => {
    if (!es) return;
    // Aantal ingevulde stockregels meetellen voor een concreter detail
    let regels = 0;
    const stock = es.stock || es.items || es.producten;
    if (Array.isArray(stock)) regels = stock.filter(Boolean).length;
    else if (stock && typeof stock === 'object') regels = Object.keys(stock).length;
    const det = [es.eventNaam, regels ? regels + ' stockregels' : ''].filter(Boolean).join(' · ');
    ev.push({
      ts: tsFrom(es.ingediend), cat: 'eindstock', person: es.medewerker || 'Onbekend',
      action: 'Eindstock ingediend', target: es.wagen || '', detail: det
    });
  });

  // 4) Poets-historie (ft_poets_history) — append-only
  Object.values(src.poetsHist || {}).forEach(h => {
    if (!h) return;
    ev.push({ ts: h.cleanedAt || 0, cat: 'poets', person: h.by || 'Poets Dashboard', action: 'Gepoetst', target: h.truck || '', detail: 'via Poets-dashboard' });
  });

  // 5) Poets-prioriteit (ft_priority_v1)
  Object.values(src.prio || {}).forEach(p => {
    if (!p || p.priority !== true) return;
    ev.push({ ts: p.setAt || 0, cat: 'prio', person: p.by || '—', action: 'Poets-prioriteit gezet', target: p.truck || '', detail: 'truck met voorrang voor poetsbeurt' });
  });

  // 6) Verhuur-handtekeningen (ft_planning_v1 → signature / returnSignature)
  Object.values(src.planning || {}).forEach(r => {
    if (!r) return;
    const who = r.title || r.name || r.klant || r.contact || 'Verhuur';
    if (r.signature && (r.signature.signedAt || r.signature.name)){
      ev.push({
        ts: tsFrom(r.signature.signedAt), cat: 'verhuur-sign', person: r.signature.name || 'Onbekend',
        action: 'Aflevering getekend' + (r.signature.role ? ' ('+r.signature.role+')' : ''), target: who, detail: ''
      });
    }
    if (r.returnSignature && (r.returnSignature.signedAt || r.returnSignature.name)){
      ev.push({
        ts: tsFrom(r.returnSignature.signedAt), cat: 'verhuur-return', person: r.returnSignature.name || 'Onbekend',
        action: 'Terugname getekend' + (r.returnSignature.role ? ' ('+r.returnSignature.role+')' : ''), target: who, detail: ''
      });
    }
  });

  // 7) Login-activiteit (_userActivity): echte login-/uitlog-gebeurtenissen
  Object.values(src.activity || {}).forEach(u => {
    if (!u) return;
    const who = u.displayName || u.email || 'Onbekend';
    // Elke loginHistory-entry is een concrete in- of uitlog-gebeurtenis
    Object.entries(u.loginHistory || {}).forEach(([ts, h]) => {
      h = h || {};
      const when = parseInt(ts, 10) || 0;
      const isOut = h.type === 'logout';
      const dev = deviceFromUA(h.userAgent);
      const prov = providerLabel(h.provider);
      const det = isOut ? dev
        : [prov ? 'via ' + prov : '', dev].filter(Boolean).join(' · ');
      ev.push({
        ts: when, cat: isOut ? 'logout' : 'login', person: who,
        action: isOut ? 'Uitgelogd' : 'Ingelogd', target: u.email || '', detail: det
      });
    });
    // Laatst-gezien als losse, rustigere categorie (presentie-stempel)
    if (u.lastSeen){
      ev.push({
        ts: u.lastSeen, cat: 'actief', person: who,
        action: 'Laatst actief', target: u.email || '',
        detail: u.loginCount ? u.loginCount + 'e login' : ''
      });
    }
  });

  // 7b) Verwijderingen (_deletions): wie verwijderde wat, mét de inhoud
  Object.values(src.deletions || {}).forEach(d => {
    if (!d) return;
    const cat = CATS['del-' + d.type] ? 'del-' + d.type : 'del-overig';
    let detail = '';
    try {
      const o = d.detail ? JSON.parse(d.detail) : {};
      if (o.trucks && o.trucks.length) detail = 'Trucks: ' + o.trucks.join(', ');
      else if (o.truck) detail = 'Truck: ' + o.truck;
      else if (o.startDate) detail = o.startDate + (o.endDate && o.endDate !== o.startDate ? ' → ' + o.endDate : '');
    } catch (e) {}
    ev.push({
      ts: tsFrom(d.at), cat: cat, person: d.name || d.email || 'Onbekend',
      action: d.label || 'Verwijderd', target: '', detail: detail
    });
  });

  // 8) Laadlijsten (ft_laadlijsten_v1): aanmaak + laatste wijziging/status
  const LL_LABEL = { nieuw:'Nieuw', laden:'Laden', retour:'Retour', te_factureren:'Te factureren', gefactureerd:'Gefactureerd', archief:'Archief' };
  Object.values(src.laadlijsten || {}).forEach(l => {
    if (!l) return;
    const naam = l.eventNaam || l.naam || 'Laadlijst';
    const wie  = l.geladenDoor || '—';
    const tCreate = tsFrom(l.aangemaakt);
    const tEdit   = tsFrom(l.aangepast_op);
    if (tCreate){
      ev.push({
        ts: tCreate, cat: 'laadlijst', person: l.automatisch_aangemaakt ? 'Automatisch' : wie,
        action: 'Laadlijst aangemaakt', target: naam,
        detail: [l.wagen, LL_LABEL[l.status] || l.status].filter(Boolean).join(' · ')
      });
    }
    // Toon een wijziging alleen als die duidelijk ná de aanmaak ligt
    if (tEdit && tEdit > tCreate + 1000){
      ev.push({
        ts: tEdit, cat: 'laadlijst', person: wie,
        action: 'Laadlijst bijgewerkt', target: naam,
        detail: ['status: ' + (LL_LABEL[l.status] || l.status || '?'), l.wagen].filter(Boolean).join(' · ')
      });
    }
  });

  // 9) AI-logboek (_aiLogs): vragen, antwoorden en uitgevoerde agent-acties.
  //    Per gebruiker → per gesprek → events. Geeft zicht op waar mensen de AI
  //    voor gebruiken (coachen) en wat de agent in de app doet.
  const aiSnip = t => { t = String(t == null ? '' : t).replace(/\s+/g, ' ').trim(); return t.length > 240 ? t.slice(0, 240) + '…' : t; };
  Object.values(src.ai || {}).forEach(userLogs => {
    if (!userLogs) return;
    Object.values(userLogs).forEach(conv => {
      if (!conv) return;
      const meta = conv.meta || {};
      const who = meta.displayName || meta.email || 'Onbekend';
      Object.values(conv.events || {}).forEach(e => {
        e = e || {};
        const when = parseInt(e.t, 10) || 0;
        if (!when) return;
        const modelTag = e.model ? e.model : '';
        if (e.kind === 'question') {
          ev.push({ ts: when, cat: 'ai-vraag', person: who,
            action: 'Vroeg aan AI', target: '', detail: aiSnip(e.text) });
        } else if (e.kind === 'answer') {
          ev.push({ ts: when, cat: 'ai-antwoord', person: who,
            action: 'AI antwoordde' + (modelTag ? ' (' + modelTag + ')' : ''),
            target: '', detail: aiSnip(e.text) });
        } else if (e.kind === 'action') {
          const TOOL = { click: 'Klik', fill: 'Invullen', navigate: 'Navigeren' };
          const verb = TOOL[e.tool] || e.tool || 'Actie';
          const ok = e.approved === false ? ' — GEWEIGERD' : '';
          ev.push({ ts: when, cat: 'ai-actie', person: who,
            action: 'AI-actie: ' + verb + ok, target: e.target || '',
            detail: e.value ? ('= ' + e.value) : (e.page || '') });
        }
      });
    });
  });

  events = ev.filter(e => e.ts && e.ts > 0).sort((a,b) => b.ts - a.ts);
  render();
}

// ─────────────────────────────────────────────────────────────
// FILTER + RENDER
// ─────────────────────────────────────────────────────────────
function periodStart(){
  const p = document.getElementById('period').value;
  const now = new Date();
  if (p === 'today') return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  if (p === 'week'){ const d = now.getDay() || 7; return new Date(now.getFullYear(), now.getMonth(), now.getDate()-d+1).getTime(); }
  if (p === 'month') return new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  return 0;
}
function getFiltered(){
  const start = periodStart();
  const q = (document.getElementById('search').value || '').trim().toLowerCase();
  return events.filter(e => {
    if (tabOfCat(e.cat) !== currentTab) return false;
    if (e.ts < start) return false;
    if (!activeCats.has(e.cat)) return false;
    if (q){
      const hay = (e.person+' '+e.action+' '+e.target+' '+e.detail).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}
function render(){
  const list = getFiltered();
  const body = document.getElementById('audit-body');

  // Stats
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  document.getElementById('st-total').textContent = list.length;
  document.getElementById('st-today').textContent = list.filter(e => e.ts >= todayStart.getTime()).length;
  document.getElementById('st-people').textContent = new Set(list.map(e => (e.person||'').trim()).filter(p => p && p !== '—')).size;
  document.getElementById('st-last').textContent = list.length ? fmtShort(list[0].ts) : '—';
  document.getElementById('subtitle').textContent =
    `${list.length} gebeurtenis${list.length!==1?'sen':''} getoond · ${events.length} totaal · bijgewerkt ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;

  if (!list.length){
    body.innerHTML = '<div class="empty"><div class="empty-icon">🗂️</div><div>Geen gebeurtenissen voor dit filter.</div></div>';
    return;
  }
  body.innerHTML = list.slice(0, 1000).map(e => {
    const c = CATS[e.cat] || { label: e.cat, color: '#888' };
    const chip = `<span class="chip" style="background:${c.color}1f;color:${c.color}"><span class="cdot"></span>${esc(c.label)}</span>`;
    const target = e.target ? `<span class="target">${esc(e.target)}</span>` : '';
    return `<div class="audit-row">
      <div class="ar-time">${fmtDateTime(e.ts)}</div>
      <div class="ar-cat">${chip}</div>
      <div class="ar-person">${esc(e.person || '—')}</div>
      <div class="ar-action">${esc(e.action || '')}${target}</div>
      <div class="ar-detail">${esc(e.detail || '')}</div>
    </div>`;
  }).join('');
  document.getElementById('load-note').textContent = list.length > 1000
    ? `Toont eerste 1000 van ${list.length}. Verfijn met filters of export naar CSV voor de volledige set.`
    : '';
}

// ─────────────────────────────────────────────────────────────
// CATEGORIE-FILTERS UI
// ─────────────────────────────────────────────────────────────
// ── TABBLADEN: verwijderingen (standaard) / activiteit / login ──
let currentTab = 'deletions';
function tabOfCat(cat){
  if (cat.indexOf('del-') === 0) return 'deletions';
  if (cat === 'login' || cat === 'logout' || cat === 'actief') return 'login';
  return 'activity';
}
function catsForTab(tab){ return CAT_KEYS.filter(k => tabOfCat(k) === tab); }
function switchTab(t){
  currentTab = t;
  activeCats = new Set(catsForTab(t));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === t));
  buildCatFilters(); render();
}
function buildCatFilters(){
  const wrap = document.getElementById('cat-filters');
  wrap.innerHTML = catsForTab(currentTab).map(k => {
    const c = CATS[k];
    return `<button class="cat-pill active" data-cat="${k}" style="--c:${c.color}" onclick="toggleCat('${k}')">
      <span class="cdot" style="background:${c.color}"></span>${esc(c.label)}</button>`;
  }).join('');
  syncCatUI();
}
function toggleCat(k){
  if (activeCats.has(k)) activeCats.delete(k); else activeCats.add(k);
  syncCatUI(); render();
}
function toggleAllCats(){
  const tc = catsForTab(currentTab);
  if (tc.every(k => activeCats.has(k))) tc.forEach(k => activeCats.delete(k));
  else tc.forEach(k => activeCats.add(k));
  syncCatUI(); render();
}
function syncCatUI(){
  document.querySelectorAll('.cat-pill').forEach(p => {
    const k = p.getAttribute('data-cat');
    const on = activeCats.has(k);
    p.classList.toggle('active', on);
    p.style.background = on ? CATS[k].color : 'var(--surface)';
    p.style.color = on ? '#fff' : 'var(--text2)';
  });
}

// ─────────────────────────────────────────────────────────────
// CSV EXPORT
// ─────────────────────────────────────────────────────────────
function exportCsv(){
  const list = getFiltered();
  const rows = [['Datum','Tijd','Categorie','Persoon','Actie','Object','Detail']];
  list.forEach(e => {
    const d = new Date(e.ts);
    rows.push([
      d.toLocaleDateString('nl-NL'),
      d.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}),
      (CATS[e.cat]||{}).label || e.cat,
      e.person || '', e.action || '', e.target || '', e.detail || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(';')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'senorsnacks-auditlog-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────────────────────────
// DATA LADEN (pas na admin-gate)
// ─────────────────────────────────────────────────────────────
function markLoaded(name){
  loaded[name] = true;
  rebuild();
}
function startListeners(){
  fbdb.ref('ft_ops_v2').on('value',       s => { src.ops       = s.val() || {}; markLoaded('ops'); });
  fbdb.ref('ft_notities_v1').on('value',   s => { src.notities  = s.val() || {}; markLoaded('notities'); });
  fbdb.ref('ft_eindstock_v1').on('value',  s => { src.eindstock = s.val() || {}; markLoaded('eindstock'); });
  fbdb.ref('ft_poets_history').on('value', s => { src.poetsHist = s.val() || {}; markLoaded('poetsHist'); });
  fbdb.ref('ft_priority_v1').on('value',   s => { src.prio      = s.val() || {}; markLoaded('prio'); });
  fbdb.ref('ft_planning_v1').on('value',   s => { src.planning  = s.val() || {}; markLoaded('planning'); });
  fbdb.ref('ft_laadlijsten_v1').on('value',s => { src.laadlijsten = s.val() || {}; markLoaded('laadlijsten'); });
  fbdb.ref('_userActivity').on('value',    s => { src.activity  = s.val() || {}; markLoaded('activity'); }, () => {});
  fbdb.ref('_aiLogs').on('value',          s => { src.ai        = s.val() || {}; markLoaded('ai'); }, () => {});
  fbdb.ref('_deletions').on('value',       s => { src.deletions = s.val() || {}; markLoaded('deletions'); }, () => {});
  setInterval(render, 60000); // klok/relatieve weergave fris houden
}

function boot(roleNote){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('wrap').style.display = 'block';
  switchTab('deletions');
  startListeners();
  if (roleNote) document.getElementById('whoami').textContent = roleNote;
}
function denyAccess(detail){
  const t = document.getElementById('gate-title');
  const m = document.getElementById('gate-msg');
  t.textContent = '⛔ Geen toegang';
  m.innerHTML = 'Het audit-log is alleen voor <b>admins</b>.' +
    (detail && detail.email ? '<br><span class="sub">Ingelogd als ' + esc(detail.email) + (detail.role ? ' · rol: ' + esc(detail.role) : ' · geen rol') + '</span>' : '');
}

// ─────────────────────────────────────────────────────────────
// ADMIN-GATE
//   V2 (hostname bevat -login / -v2): vereist window.__auth.isAdmin
//   V1 (legacy): rollen bestaan nog niet → reeds achter code-014, doorlaten
// ─────────────────────────────────────────────────────────────
(function gate(){
  const host = (location.hostname || '').toLowerCase();
  const isV2 = host.indexOf('-login') !== -1 || host.indexOf('-v2') !== -1;

  if (!isV2){
    document.getElementById('v1-badge').style.display = 'inline-block';
    boot('V1 · code-014');
    return;
  }
  function handle(auth){
    if (auth && auth.isAdmin) boot(auth.email + ' · admin');
    else denyAccess(auth);
  }
  if (window.__auth) { handle(window.__auth); return; }
  window.addEventListener('auth-ready', e => handle(e.detail));
  // Vangnet: als auth na 12s nog niet klaar is, blijft de gate "controleren…" staan
  // (auth.js stuurt niet-ingelogde gebruikers zelf door naar /login.html).
})();
